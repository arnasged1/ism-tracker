ce", "managementComment": "", "finalManagementComment": "All in order and found satisfactory."}, {"id": "7685b831-cd88-44b7-87ca-d536bbc0005c", "vessel": "Grettir Sterki", "type": "OBS", "title": "Internal audit finding #06", "description": "Handover checklist for C/E was not filled up", "dateRaised": "2024-09-16", "deadline": "2024-09-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Instructed Captain and C/E to ensure that handovers are made according the checklist.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/742/frontpage-internal-audit-finding-06?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "C/E was instructed to start doing handover according to the checklist and keep records of it."}, {"id": "39b4e634-a6b5-4f62-ac79-2655972315f2", "vessel": "Grettir Sterki", "type": "OBS", "title": "Internal audit finding #05", "description": "Checklist for critical equipment list was not filled up", "dateRaised": "2024-09-16", "deadline": "2024-09-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Instructed captain to ensure that checklist to be filled", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/741/frontpage-internal-audit-finding-05?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Captain was instructed to ensure that checklist be filled up accordingly."}, {"id": "6228b1e2-9763-4ba3-9128-72ce3fd2acfe", "vessel": "Grettir Sterki", "type": "OBS", "title": "Internal audit finding #04", "description": "Safety training manual was not in working language", "dateRaised": "2024-09-16", "deadline": "2024-09-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Instructed captain to order manual in working language", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/740/frontpage-internal-audit-finding-04?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Instructed captain to order manual in working language"}, {"id": "017cfac0-a3e4-492c-8af8-91ad247652fe", "vessel": "Grettir Sterki", "type": "NC", "title": "Internal audit finding #03", "description": "During audit we have interviewed each seafarer on 1 on 1 meeting. During this, we found out that not all seafarers can communicate in working language", "dateRaised": "2024-09-16", "deadline": "2024-09-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Instructed crew agencies to prepare seafarers for interview.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/739/frontpage-internal-audit-finding-03?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": "After discussion in the office internaly we have concluded that crew manager must ensure by receiving ir making the interviews with the seafarers before they join onboard."}, {"id": "3ab9e560-531e-466f-8153-b082c23c53e9", "vessel": "Grettir Sterki", "type": "NC", "title": "Internal audit finding #02", "description": "During audit we found out that oily water separator not working/not operational", "dateRaised": "2024-09-16", "deadline": "2024-12-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Even though the vessel is under 400 GT, it is still required to meet the 15 ppm discharge limit, and installing an OWS is the most practical and standard method to ensure compliance. Many flag states may require or recommend an OWS even for vessels under 400 GT, especially if they operate in international waters, to meet these discharge standards. If not we must look into procedures for the treatment of bilge water etc, and specify that all is discharged ashore. Likewise all discharge valves must be closed off with padlocks to ensure that bilge water is not discharged into the sea.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/738/frontpage-internal-audit-finding-02?start=0", "rootCause": "Lack of information", "managementComment": "Management will take the decision before DEC - 19 / 2024", "finalManagementComment": "OWS valve sealed and remark was made in ORB."}, {"id": "0a5c34bf-a2b5-43cf-a200-05127abd3eae", "vessel": "Grettir Sterki", "type": "NC", "title": "Internal audit finding #01", "description": "SRC certificate expired", "dateRaised": "2024-09-16", "deadline": "2024-09-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Ordered technician and class to perform survey", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/737/frontpage-internal-audit-finding-01?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "We have received renewed certificate."}, {"id": "4039ffd4-4c2c-46b3-870e-77f583866cc5", "vessel": "Grettir Sterki", "type": "NC", "title": "NAVTEX", "description": "NAVTEX can not receive any message. After Radio technician visit on the vessel, he has found that NAVTEX antenna not responding. Recommendation from technician to install new NAVTEX", "dateRaised": "2024-09-03", "deadline": "2024-09-03", "dateClosed": "", "status": "Closed", "correctiveAction": "Request has been sent to Ship management. New one installed, working properly.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/735/frontpage-navtex?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "New navtex unit was ordered and installed."}, {"id": "252180a5-b915-4873-a475-007742ca8909", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding # 9: Shore based maintenence agreement expired.", "description": "Shore-based maintenance for the radio expired on 07/2023. Root cause: Both management and crew failed to observe the typo on the agreement, and did not see that the expiry date was wrong on the agreement.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "The shore-based maintenance agreement was issued on 10.01.2024, but unfortunately, there is a typo stating that the agreement is expiring on 07.2023, see the attached agreement. A new agreement will be issued with the correct expiry date.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/731/frontpage-psc-finding-9-shore-based-maintenence-agreement-expired?start=0", "rootCause": "Lack of information", "managementComment": "This was a typo from the issuers side, should have been noticed by both crew and management. We will take more care when receiveg certificates etc.", "finalManagementComment": "Closed - but will be followed up by the management."}, {"id": "60eb4bd2-0cd6-49be-807d-576b3c03da67", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding # 8: The engine room was found in dirty and unorganized condition and the platform was slippery.", "description": "The engine room was found in dirty and unorganized condition and the platform was slippery. Root cause: Same as finding # 6, the crew has changed oil on both gensets, and didn't clean the engine room afterwards.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Engine room was tidyed up, and cleaned overall.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/730/frontpage-psc-finding-8-the-engine-room-was-found-in-dirty-and-unorganized-condition-and-the-platform-was-slippery?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "Due to the situation onboard the crew has not given enough attetion to the cleanliness of Engine room", "finalManagementComment": "Closed - but will be monitored by the management."}, {"id": "65488569-662a-4677-8eff-01a3dfcffa9e", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding # 7: No milk was found onboard.", "description": "No Milk was found onboard. Master to ensure that there is an adequate quantity of provision onboard for the current voyage. Root cause: The crew orders the provisions themselves, and as they apparently don't drink milk, this was forgotten.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "The crew does not drink milk - therefore no milk were ordered when provisions were ordered. Milk was purchased and brought onboard.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/729/frontpage-psc-finding-7-no-milk-was-found-onboard?start=0", "rootCause": "Lack of communication", "managementComment": "The crew normally orders the provisions they want as this is a small vessel.", "finalManagementComment": "Closed - no furhter action."}, {"id": "6fc486b3-8296-48ab-8cb3-010f98747edb", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding # 6: Engine room bilges full of oil.", "description": "The engine room bilges was full of oil. Root cause: On the previous voyage a false alarm regarding water in the lubricating oil on the genset was received. The crew changed the oil on both gensets as a safety precaution, leading to oil spilled to mhe bilges. Later is was established taht there was a fault on the sensor on the genset, now repaired.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Oil residues pumped ashore, bilges subsequently cleaned.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/728/frontpage-psc-finding-6-engine-room-bilges-full-of-oil?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "The crew was instructed to follow procedures, and the arrange foor oil residues to be pumped ashore, in collaboration with the technical manager.", "finalManagementComment": "CLosed - but will be followed up in the future."}, {"id": "fac53c25-2f2b-41b6-b8b6-23c7f5e90469", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding #5 - Gauge on steering gear wasted.", "description": "The gauge on the steering gear is in wasted condition. Root cause: This gauge has been wasted for a long period, but was not observed. Crew failed to report to technical management.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "New gauge ordered, and fitted.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/727/frontpage-psc-finding-5-gauge-on-steering-gear-wasted?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "The crew has failed to report this the to technical manger, so replacement can be done. Crew instructed to be more observant, and report all failures to the management.", "finalManagementComment": "Closed - but will be followed by the management."}, {"id": "1d2c6229-dbf0-46dc-af35-3145f345c7a5", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding # 4 - Steering gear alarms", "description": "The steering gear 1 alarm – Power Failure Steering Gear 1 and Overload Steering Gear 1 are permanently lit on bridge indication. Root cause: Electrical error in breaker/relais, which were not properly handled by the crew.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "An electrician from shore has been onboard to locate the problem and repair this. Was a failure in a relais..", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/726/frontpage-psc-finding-4-steering-gear-alarms?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "The crew has failed to report this error to the technical manager before departure. The crew has been instructed to report all technical faults to the management immidiately.", "finalManagementComment": "Closed - but will be monitored by the management."}, {"id": "60823652-ca44-4280-bf47-e1cc08b0f140", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding #3 - Charts not onboard", "description": "The vessel does not have charts for the current voyage. For example, BA 2902 is missing which is needed for the current location of the vessel. Similarly, IS32 and IS33 which were needed for the current voyage are found missing. Root cause: Due to a hectic program , the crew forgot to pick up deliveries before departure.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Charts ordered aan d brought onboard.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/725/frontpage-psc-finding-3-charts-not-onboard?start=0", "rootCause": "Lack of co-operation", "managementComment": "Charts were ordered and delivered to warehouse, but the crew failed to bring these onboard. Crew was instructed to be more careful and follow instructions.", "finalManagementComment": "Closed, but will be monitored by the management."}, {"id": "074a6ba9-1359-4354-b764-35b78b9e3061", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC Finding # 2: Deck area holed and corroded.", "description": "The starboard anchor foundation area on the main deck was found corroded and holed. Root cause: Maintenance work has been carried out in the area of anchor foundation, but no reporting of corrosion observed in the area has been filed. This is not in compliance with ship ISM system", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "The anchor winch was dismantled and new steel plates inserted by a certified welder, all to Class satisfaction, subsequently anchor winch will be re-mounted.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/724/frontpage-psc-finding-2-deck-area-holed-and-corroded?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "These holes was not observed during the stay in shioyard, probably as these were locate under the anchor winch. We wiill check more carefully at annual surveys, and perfom UTM when suspicios areas are observed.", "finalManagementComment": "The anchor winch was dismantled, all corroded parts of the deck eas removed, and new syteel plates inserted."}, {"id": "3d4967ce-af18-4ae2-b795-91c05a93627d", "vessel": "Grettir Sterki", "type": "NC", "title": "PSC finding #1: Emergency fire pump - not working.", "description": "The vessel needs to have 2 fire pumps and 1 emergency fire pump as per the Fire Plan. Only one fire pump was found working onboard at the time of inspection. Root cause:  The emergency fire pump, was not properly washed through with fresh water after last use, leading to corrosion inside. The crew did not check the fire pump before departure", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "The emergency fire pump onboard was defective, was replaced with a new one. The crew failed to check the emergency fire pump before departure.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/723/frontpage-psc-finding-1-emergency-fire-pump-not-working?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "The crew was instructed to follow procedures and the check all life-saving and fire-fighting equipment at the required intervals, especially after layup.", "finalManagementComment": "Closed - but will be followed up by the management."}, {"id": "9954890f-185d-4287-ae01-84c390f44e98", "vessel": "Grettir Sterki", "type": "NC", "title": "Water ingress to cahin lockers", "description": "The crew was instructed to apply polyurethane foam to the anchor hawser, but failed to do so, leading to water ingress into chanil lockers. Root cause: the crew did not follow procedures, and instructions, which says that the anchor hawsers must be sealed before proceeding to sea.", "dateRaised": "2024-05-13", "deadline": "2024-05-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Chain lockers emptied, and crew instructed to follow procedures.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/722/frontpage-water-ingress-to-cahin-lockers?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "The crew must take more care when preparing for sea.", "finalManagementComment": "Closed, but will be followed up by the management."}, {"id": "00b57d58-3438-4280-8762-84ed271ac0bd", "vessel": "Grettir Sterki", "type": "NC", "title": "Water ingress in Bow thuster room", "description": "The bottom valve oand overboard valve leading to the bowthuster room was not properly closed, causing water to ingrees into the room. Vlaves have been inspected and found in order. Root cause: Due to long layup the valves were not closing correctly, and the crew failed to check.", "dateRaised": "2024-05-13", "deadline": "2024-06-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Water pumped out and the bowthruster room inspected. All found in good order. A bilge alarm will be installed within shortly.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/grettir-sterki-report-a-notification/details/18/721/frontpage-water-ingress-in-bow-thuster-room?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "We will implement procedures for a proper check of all valves etc. after layup periods. NC will be closed when Bilge Alarm is installed.", "finalManagementComment": "Bilge alarm installed"}, {"id": "d80a1fe0-1297-4548-9f61-6d44f46fe696", "vessel": "Selvik Ice", "type": "NC", "title": "Discrepancy in Rest Hours documentation", "description": "Mismatch identified between crew rest hour records and drill records. Sampling revealed two instances of non-compliance: •\t10/05: 2 ABs and 1 Officer. •\t25/05: 2 ABs and 1 Officer.", "dateRaised": "2026-06-23", "deadline": "2026-09-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Internal finding report to be prepared by the Master. Corrective action: •\tInternal finding will be written by Captain •\tIt will be highlighted on the next safety meeting •\tCaptain will write it in the handover •\tCaptain will be more vigilant checking the Rest Hour records moving forward", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/851/frontpage-discrepancy-in-rest-hours-documentation?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "cfcbfa6b-e691-486f-b6f4-99ca2cf044c0", "vessel": "Selvik Ice", "type": "NM", "title": "Enclosed Space Entering Procedures", "description": "The vessel was in drydock. During preparations for enclosed space entry, a crew member was about to enter the tank without conducting atmospheric testing and without verifying that the enclosed space entry procedures had been completed by the responsible person. The unsafe act was noticed by another crew member before entry was made and was immediately stopped. No injury or damage occurred.", "dateRaised": "2026-06-11", "deadline": "2026-06-30", "dateClosed": "", "status": "Closed", "correctiveAction": "Entry into the tank was stopped immediately. Atmospheric testing was carried out using a calibrated gas detector, and the enclosed space entry permit was verified before any entry was allowed. A toolbox meeting was conducted with the involved crew members to reinforce compliance with enclosed space entry procedures. The incident could have resulted in oxygen deficiency, exposure to toxic gases, asphyxiation, serious injury, or fatality.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/850/frontpage-enclosed-space-entering-procedures?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "dee0a782-5418-4f7e-9dcb-194e3536ef6c", "vessel": "Selvik Ice", "type": "NM", "title": "Safety matter during Backstow operation", "description": "Description: During backstow operations, a crew member was observed standing too close to a line under tension. The crew member was positioned within a restricted area that is required to remain clear during backstow operations, as designated by the Officer of the Watch (OOW). The situation was identified by a supervisor/crew member, and the individual was immediately instructed to move to a safe location. No injuries, equipment damage, or operational impact occurred. Contributing factors may have included a lack of situational awareness and insufficient attention to designated exclusion zones during preparatory activities", "dateRaised": "2026-06-11", "deadline": "2026-06-30", "dateClosed": "", "status": "Closed", "correctiveAction": "The crew member was immediately instructed to clear the area and relocate to a safe position. A reminder was issued to all personnel regarding backstow line hazards and exclusion zone requirements. There was a risk of serious injury or fatality in the event of line failure or unexpected line movement.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/849/frontpage-safety-matter-during-backstow-operation?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "eec24094-d98d-40b8-84d0-05e066673d21", "vessel": "Selvik Ice", "type": "NC", "title": "NC expired Class certificates", "description": "The vessel’s ISSC, SMC and MLC certificates expired on 28.05.2026 before the renewal audit could be completed. The renewal audit was originally planned for Fredericia, however due to unexpected water ballast tank damage and urgent repair works, the vessel’s schedule was affected and the audit had to be rescheduled. Class has been contacted, and the renewal audit remains planned for the next suitable port call in Fredericia. The Company will review the case and ensure that contingency options are considered in case of future unexpected operational delays. This NC will be closed after completion of the renewal audit and verification of valid certificates onboard.", "dateRaised": "2026-05-28", "deadline": "2026-06-28", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/846/frontpage-nc-expired-class-certificates?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "fb6a6be6-cfcf-4303-8ec4-73dfe3a98fb5", "vessel": "Selvik Ice", "type": "NC", "title": "PSC 26-18408 Paint store", "description": "Paint store – The ventilation and light were observed out of order.", "dateRaised": "2026-05-20", "deadline": "2026-05-20", "dateClosed": "", "status": "Closed", "correctiveAction": "The paint store ventilation and lighting were immediately repaired and tested to confirm proper operation. The crew carried out an inspection of the paint store to ensure the space is safe for use, properly ventilated, and adequately illuminated.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/844/frontpage-psc-26-18408-paint-store?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "3627abd8-b49a-49cb-a909-d69745ba1fca", "vessel": "Selvik Ice", "type": "NC", "title": "PSC 26-18401 Medical Equipement", "description": "Medical Equipment – the resuscitator onboard found not assembled and ready to use.", "dateRaised": "2026-05-20", "deadline": "2026-05-20", "dateClosed": "", "status": "Closed", "correctiveAction": "The resusciator was immediately checked, fully assembled, and arranged in a ready-to-use condition.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/843/frontpage-psc-26-18401-medical-equipement?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "d6a5d9e5-a25d-4cd8-bcba-829d2b7d1000", "vessel": "Selvik Ice", "type": "NC", "title": "PSC 26-18408 Electrical box", "description": "Electrical box for the communication in the steering gear room found without cover.", "dateRaised": "2026-05-20", "deadline": "2026-05-20", "dateClosed": "", "status": "Closed", "correctiveAction": "The missing cover for the electrical communication box in the steering gear room was immediately fitted/replaced to ensure the box is properly protected and safe for operation. A full inspection of electrical boxes, panels, and communication equipment in the steering gear room and other relevant areas was carried out to verify that all covers are in place, properly secured, and in good condition. The crew has been instructed to include visual checks of electrical boxes and panel covers during routine inspections, and any missing or damaged covers shall be reported and rectified immediately.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/842/frontpage-psc-26-18408-electrical-box?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "0cb1d225-3343-4e0d-9bdc-a0efce3cc901", "vessel": "Selvik Ice", "type": "NC", "title": "Emergency escape hatch from the engine room was found not operational, affecting safe emergency evacuation.", "description": "Emergency escape routes and exits, including engine room emergency escape hatch, shall be maintained in operational condition at all times to ensure safe evacuation in case of emergency.", "dateRaised": "2026-05-03", "deadline": "2026-04-25", "dateClosed": "", "status": "Closed", "correctiveAction": "The defective emergency hatch was repaired and tested to ensure full operational condition. Inspection and testing of all emergency escape routes were carried out. PMS updated if required.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/840/frontpage-emergency-escape-hatch-from-the-engine-room-was-found-not-operational,-affecting-safe-emergency-evacuation?start=0", "rootCause": "Lack of procedure(s)", "managementComment": "", "finalManagementComment": "We acknowledge the seriousness of the finding, as emergency escape routes must remain fully operational at all times. The immediate corrective action taken on board is considered appropriate. The emergency escape hatch was repaired and tested, and additional checks of all emergency escape routes were carried out to verify their operational condition. We will add routine checks of emergency exits into PMS to prevent reocurrance."}, {"id": "8c92453b-9c13-4f9a-ac6f-2b4ffec7b49a", "vessel": "Selvik Ice", "type": "OBS", "title": "REC 01/2026 - Internal Audit", "description": "It is recommended to consider a more user-friendly system for recording rest hours, subject to Flag approval.", "dateRaised": "2026-04-16", "deadline": "2026-04-16", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/833/frontpage-rec-01-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "72fbe3fe-6bae-436e-8606-b1c28557edb2", "vessel": "Selvik Ice", "type": "OBS", "title": "OBS 05/2026 - Internal Audit", "description": "No record of the test of the vessel cargo hoses was produced.", "dateRaised": "2026-04-16", "deadline": "2026-04-16", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/832/frontpage-obs-05-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "50107676-0d35-47cd-b17e-2654f17c46f6", "vessel": "Selvik Ice", "type": "OBS", "title": "OBS 04/2026 - Internal Audit", "description": "Bunker pipeline not pressure tested as required.", "dateRaised": "2026-04-16", "deadline": "2026-04-16", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/831/frontpage-obs-04-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "2c8775ad-9823-4df1-9d2a-08b9e3609a62", "vessel": "Selvik Ice", "type": "OBS", "title": "OBS 03/2026 - Internal Audit", "description": "CE’s standing orders found in the dressing room are not readable.", "dateRaised": "2026-04-16", "deadline": "2026-04-16", "dateClosed": "", "status": "Closed", "correctiveAction": "The Chief Engineer will replace the unreadable standing orders with a clear and legible copy. The document will be properly displayed and maintained in good condition.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/830/frontpage-obs-03-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": "Uploaded into SMS and posted on the wall."}, {"id": "b7f10c7d-078d-4753-ba73-dcfbdef1c201", "vessel": "Selvik Ice", "type": "OBS", "title": "OBS 02/2026 - Internal Audit", "description": "ODME inoperative, short-term IOPP issued.", "dateRaised": "2026-04-16", "deadline": "2026-04-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Class is informed and ST IOPP issued.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/829/frontpage-obs-02-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "25fa9bdc-55bd-4c0c-aef3-67c46a8a12ea", "vessel": "Selvik Ice", "type": "OBS", "title": "OBS 01/2026 - Internal Audit", "description": "It was observed during spot checks on board that not all deliveries were accompanied by an MSDS, as required under the IHM maintenance procedure.", "dateRaised": "2026-04-16", "deadline": "2026-04-16", "dateClosed": "", "status": "Closed", "correctiveAction": "The management and vessel’s Master will reinforce the requirement that all deliveries must be accompanied by a valid MSDS in accordance with the procedure 10.9.0 of the SMS. The crew will be instructed to verify the presence of MSDS upon receipt of goods, and any missing documentation will be requested from the supplier before acceptance or use. Records will be maintained on board, and compliance will be monitored through periodic checks and internal audits.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/828/frontpage-obs-01-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "5feb26f8-8554-4d2e-8e62-f91464a525f1", "vessel": "Selvik Ice", "type": "NC", "title": "NC 02/2026 - Internal Audit", "description": "No objective evidence of the use of a specific cargo plan was identified during the audit, nor was a procedure for its preparation found.", "dateRaised": "2026-04-16", "deadline": "2026-05-16", "dateClosed": "", "status": "Closed", "correctiveAction": "The management will develop and implement a procedure for the preparation and use of cargo plans. The bridge team will be instructed to prepare and retain a documented cargo plan for each operation, approved by the Master. Compliance will be verified during internal audits.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/827/frontpage-nc-02-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": "We have implemented cargo plan checklists 7-0507I LOADING DISCHARGING BALLAST PLANNING"}, {"id": "c3948093-f53f-48bf-aba0-5e1c175fdb35", "vessel": "Selvik Ice", "type": "NC", "title": "NC 01/2026 - Internal Audit", "description": "During the SMS review, no objective evidence was found that a risk assessment system was in place.", "dateRaised": "2026-04-16", "deadline": "2026-05-16", "dateClosed": "", "status": "Closed", "correctiveAction": "The Master has been instructed to rectify this within one month.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/826/frontpage-nc-01-2026-internal-audit?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "c5fb22fe-dcf7-4f9d-a64a-29db95305827", "vessel": "Selvik Ice", "type": "NM", "title": "Near miss Helmsman seat", "description": "The bridge helmsman seat has suffered significant structural failure. The chair's internal support mechanism is broken, causing it to tilt at critical, unstable angle Furthermore, the external upholstery is torn, exposing  sharp metal internal structures.", "dateRaised": "2026-02-24", "deadline": "2026-03-01", "dateClosed": "", "status": "Closed", "correctiveAction": "It is recommended to supply a heavy-duty, marine-grade replacement seat immediately.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/800/frontpage-near-miss-helmsman-seat?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": "To be delegated to the ship`s superintendent."}, {"id": "a5581be7-9d06-46cb-8aa5-afea4aee670c", "vessel": "Selvik Ice", "type": "NC", "title": "NC 03-26 Tank Monitoring System", "description": "NC 03-26 Tank Monitoring System.", "dateRaised": "2026-01-26", "deadline": "2026-11-30", "dateClosed": "", "status": "Open", "correctiveAction": "Download 970nc0326tankmonitoringsystem.docx Type: application/vnd.openxmlformats-officedocument.wordprocessingml.document Size: 0.12 MB Hits: 6", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/786/frontpage-nc-03-26-tank-monitoring-system?start=0", "rootCause": "Choose:", "managementComment": "Independent UTI measurements shall be used at all times to verify tank level readings during cargo operations, particularly when approaching critical filling limits, to ensure safe control and prevent overfilling. The crew must check between the Tank Monitoring System indications and manual measurements during cargo loading. Crew should identify the reasons for the incorrect measurements and decide with technical superintendent how to rectify it. Until permanent rectification is completed, manual verification remains a compulsory control measure for all cargo operations.", "finalManagementComment": ""}, {"id": "7f2013d3-1795-4586-9260-93da249a0779", "vessel": "Selvik Ice", "type": "NC", "title": "NC 02-26 SUZUKI DF30A", "description": "NC 02-26 SUZUKI DF30A", "dateRaised": "2026-01-23", "deadline": "2026-01-23", "dateClosed": "", "status": "Closed", "correctiveAction": "Download nc0226suzukidf30a.docx Type: application/vnd.openxmlformats-officedocument.wordprocessingml.document Size: 0.77 MB Hits: 4", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/785/frontpage-nc-02-26-suzuki-df30a?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": "SOLAS/LSA Code does not explicitly require Teleflex steering. It does not require remote throttle/gear control specifically. It requires the boat to be safe, controllable, and capable of maneuvering effectively Superindendent is responsible to check with owners how they want the boat steering to be made."}, {"id": "5f0b0fb8-f8f7-4dbb-8cec-537f470cac68", "vessel": "Selvik Ice", "type": "NM", "title": "AB not wearing a PPE", "description": "During routine operations on deck, AB was found observed working without wearing a safety helmet. No injury occured, however the situation had the potential to result in serious head injury if object had fallen or the seaman had slipped.", "dateRaised": "2026-01-13", "deadline": "2026-01-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Safety briefing completed with deck crew. Reminder issued on mandatory use of PPE at all times on deck. Increased supervision by duty officer. PPE compliance to be monitored during toolbox talks. PPE must be worn at all times in designated areas. Even short-term NC can lead to serious injury. Conduct PPE compliance inspections by officers and supervisors.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/783/frontpage-ab-not-wearing-a-ppe?start=0", "rootCause": "Lack of training", "managementComment": "", "finalManagementComment": "Management has reviewed the near-miss involving a crew member working on deck without a safety helmet. Although no injury occurred, the situation had the potential to result in serious harm. Immediate corrective actions were taken, including a safety briefing, reinforcement of mandatory PPE requirements, increased supervision, and confirmation that this near-miss will be referred to during upcoming toolbox talks and safety meetings. If near-miss reocurs, verbal warnings may be issued to the crew. The near-miss is considered closed."}, {"id": "9ada1770-5443-4a8a-bbf5-31fb4f316722", "vessel": "Selvik Ice", "type": "NM", "title": "ER Hot Water Heaters", "description": "ER Hot Water El. Heaters (15kW and 30kW) which works in auto mode and as usually work when ME stopped. So this heaters have 3 fuses in MSB for safety reason. This fuses were found in very hot condition, so hot that plastic plate around fuses became black due to overheating", "dateRaised": "2026-01-13", "deadline": "2026-01-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Hazardous situation (fire) could have occurred in ER. The fuses were immidiately replaced for new one's 63A each. But situation repeated. We have switched off heaters for the night time, next day we have tried to switch off only one heater, then another fuse became warm and not hot. We have rechecked with shore electrician el.scheme and made measurements. His decision: two heaters give 60A current, but fuses have 63A or almost max current, that is why fuses heats. Need work only with one heater for safety or replace cable from MSB with fuses for more powerfull (about 80A)", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/782/frontpage-er-hot-water-heaters?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": "Management has reviewed the near-miss involving overheating of fuses supplying the ER hot water electric heaters. The investigation confirmed that when both heaters operate simultaneously, the combined load is close to the rated capacity of the installed 63A fuses, leading to overheating and increased fire risk. As an immediate risk-control measure, operation has been limited to one heater only. Electrical schematics and load measurements were reviewed together with a shore electrician, confirming that the existing cable and fuse rating are marginal for simultaneous operation. Permanent corrective action will be evaluated, including upgrading the supply cables and protective devices to an appropriate rating in accordance with load requirements. The near-miss has been addressed, risk mitigated, and the case is considered closed, subject to implementation of the permanent corrective action."}, {"id": "d41e7d9a-5533-40c4-9c67-6e5f9cfe5469", "vessel": "Selvik Ice", "type": "NC", "title": "Free-Fall Lifeboat Davit Rollers", "description": "During inspection of the FFLB davit, it was found that the rollers pins on which the rope runs are not equipped with grease nipples. The roller pins have no lubrication fittings, which makes it impossible to apply grease in a proper and controlled manner. This condition may lead to insufficient lubrication, increased wear, and potential malfunction of the roller. Roller pins on the FFLB davit were supplied without lubrication fittings (grease nipples) as part of the original equipment design.", "dateRaised": "2026-01-13", "deadline": "2026-01-13", "dateClosed": "", "status": "Closed", "correctiveAction": "The installation of the pin without a lubrication grease nipple on the FFLB davit is in accordance with the manufacturer’s design. This has been verified and confirmed. Accordingly, non-conformity can be considered closed", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/selvik-ice-report-a-notification/details/28/781/frontpage-free-fall-lifeboat-davit-rollers?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "Management has reviewed the non-conformance and confirmed that the FFLB davit roller pins were supplied without grease nipples in accordance with the manufacturer’s approved original design. The arrangement complies with the manufacturer’s specifications and does not represent a deviation. No corrective action is required, and the non-conformance is considered closed."}];
let findings = [], editingId = null;

function load() {
  try {
    findings = JSON.parse(JSON.stringify(SEED));
  } catch(e) { findings = JSON.parse(JSON.stringify(SEED)); }
  refreshOverdue();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(findings)); }
function refreshOverdue() {
  const today = new Date().toISOString().slice(0,10);
  findings.forEach(function(f) {
    if (f.status === 'Open' && f.deadline && f.deadline < today) f.status = 'Overdue';
    if (f.status === 'Overdue' && (!f.deadline || f.deadline >= today)) f.status = 'Open';
  });
}

function showSection(id, tab, pushState) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  tab.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'findings') renderTable();
  if (pushState !== false) {
    history.pushState({section: id}, '', '#' + id);
  }
}

function populateVesselSelects() {
  ['fVessel','filterVessel'].forEach(function(id) {
    var el = document.getElementById(id);
    while (el.options.length > 1) el.remove(1);
    VESSELS.forEach(function(v) { var o = document.createElement('option'); o.value = o.textContent = v; el.appendChild(o); });
  });
}

function setPreset(btn, months) {
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var today = new Date();
  document.getElementById('dashTo').value = today.toISOString().slice(0,10);
  if (months === 0) {
    document.getElementById('dashFrom').value = '';
  } else {
    var from = new Date(today);
    from.setMonth(from.getMonth() - months);
    document.getElementById('dashFrom').value = from.toISOString().slice(0,10);
  }
  renderDashboard();
}
function resetDrillMode() {}
function clearTablePresets() {
  document.querySelectorAll('.table-preset-btn').forEach(function(b){b.classList.remove('active');});
}
function setTablePreset(btn, months) {
  clearTablePresets();
  btn.classList.add('active');
  var today = new Date();
  if (months === 0) {
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value   = '';
  } else {
    var from = new Date(today);
    from.setMonth(from.getMonth() - months);
    document.getElementById('filterFrom').value = from.toISOString().slice(0,10);
    document.getElementById('filterTo').value   = today.toISOString().slice(0,10);
  }
  resetDrillMode();
  renderTable();
}
function onDateChange() {
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  renderDashboard();
}
function getFiltered() {
  var from = document.getElementById('dashFrom').value;
  var to   = document.getElementById('dashTo').value;
  return findings.filter(function(f) {
    if (from && f.dateRaised && f.dateRaised < from) return false;
    if (to   && f.dateRaised && f.dateRaised > to)   return false;
    return true;
  });
}

function renderDashboard() {
  var df = getFiltered();
  document.getElementById('dashCount').textContent = df.length + ' finding' + (df.length !== 1 ? 's' : '') + ' in range';
  renderSummaryBar(df);
  renderVesselCards(df);
}

function sCard(lbl, num, color, sub, filterType, filterStatus) {
  var onclick = '';
  if (filterType)   onclick = 'drillDown(\'\',\''+filterType+'\',\'\')';
  if (filterStatus) onclick = 'drillDown(\'\',\'\',\''+filterStatus+'\')';
  if (lbl==='Total findings') onclick = 'drillDown(\'\',\'\',\'\')';
  return '<div class="summary-card" style="border-top-color:' + color + '" onclick="' + onclick + '">' +
    '<div class="s-num" style="color:' + color + '">' + num + '</div>' +
    '<div class="s-lbl">' + lbl + '</div>' +
    '<div class="s-sub">' + sub + '</div></div>';
}

function rowClick(e, id) {
  if (e.target.closest('button')) return;
  openDetail(id);
}

function drillDownVessel(vessel) {
  drillDown(vessel, '', '');
}

function drillDownVesselType(vessel, type) {
  drillDown(vessel, type, '');
}

function drillDownOverdue(vessel, type) {
  clearTablePresets();
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = 'Overdue';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}
function drillDown(vessel, type, status) {
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = status || '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = document.getElementById('dashFrom').value;
  document.getElementById('filterTo').value     = document.getElementById('dashTo').value;
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}

function renderSummaryBar(df) {
  var total   = findings.length;
  var nc      = df.filter(function(f){return f.type==='NC';}).length;
  var nm      = df.filter(function(f){return f.type==='NM';}).length;
  var obs     = df.filter(function(f){return f.type==='OBS';}).length;
  var open    = df.filter(function(f){return f.status==='Open';}).length;
  var overdue = findings.filter(function(f){return f.status==='Overdue';}).length;
  document.getElementById('summaryBar').innerHTML =
    sCard('Total findings',   total,   '#1a3a5c', 'all time',  '',    ''       ) +
    sCard('Non-conformities', nc,      '#9b5555', 'in period', 'NC',  ''       ) +
    sCard('Near misses',      nm,      '#9b7a35', 'in period', 'NM',  ''       ) +
    sCard('Observations',     obs,     '#1a5ea8', 'in period', 'OBS', ''       ) +
    sCard('Open',             open,    '#a03030', 'in period', '',    'Open'   ) +
    '<div class="summary-card" style="border-top-color:#60408a" onclick="drillDownOverdue(\'\',\'\')"><div class="s-num" style="color:#60408a">' + overdue + '</div><div class="s-lbl">Overdue</div><div class="s-sub">fleet-wide</div></div>';
}

function renderVesselCards(df) {
  var grid = document.getElementById('vesselGrid');
  grid.innerHTML = '';
  VESSELS.forEach(function(vessel) {
    var vf = df.filter(function(f){return f.vessel===vessel;});
    var total = vf.length;
    var rows = ['NC','NM','OBS'].map(function(type) {
      var tf = vf.filter(function(f){return f.type===type;});
      var raised  = tf.length;
      var closed  = tf.filter(function(f){return f.status==='Closed';}).length;
      var overdue = findings.filter(function(f){return f.vessel===vessel && f.type===type && f.status==='Overdue';}).length;
      return '<div class="type-row" style="cursor:pointer;" onclick="drillDownVesselType(\''+vessel+'\',\''+type+'\')" title="View ' + type + ' for ' + vessel + '">' +
        '<span class="type-label type-' + type.toLowerCase() + '">' + type + '</span>' +
        '<div class="stat-box stat-raised"><div class="stat-num">' + raised + '</div><div class="stat-lbl">Raised</div></div>' +
        '<div class="stat-box stat-closed"><div class="stat-num">' + closed + '</div><div class="stat-lbl">Closed</div></div>' +
        '<div class="stat-box stat-overdue"><div class="stat-num">' + overdue + '</div><div class="stat-lbl">Overdue</div></div>' +
        '</div>';
    }).join('');
    grid.innerHTML +=
      '<div class="vessel-card">' +
        '<div class="vessel-card-header" onclick="drillDownVessel(\''+vessel+'\')" title="Click to view all findings for this vessel"><h3>' + vessel + '</h3><span class="vessel-badge">' + total + ' finding' + (total!==1?'s':'') + ' &rsaquo;</span></div>' +
        '<div class="vessel-card-body">' +
          '<div style="display:grid;grid-template-columns:100px 1fr 1fr 1fr;gap:8px;padding:0 0 8px;border-bottom:0.5px solid #eef2f7;margin-bottom:4px;">' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;">TYPE</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">RAISED</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">CLOSED</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">OVERDUE</span>' +
          '</div>' + rows +
        '</div></div>';
  });
}

function renderTable() {
  var vessel = document.getElementById('filterVessel').value;
  var type   = document.getElementById('filterType').value;
  var status = document.getElementById('filterStatus').value;
  var search = document.getElementById('filterSearch').value.toLowerCase();
  var order  = {Overdue:0,Open:1,Closed:2};
  var dateFrom = document.getElementById('filterFrom').value;
  var dateTo   = document.getElementById('filterTo').value;
  var filtered = findings.filter(function(f) {
    if (vessel   && f.vessel !== vessel) return false;
    if (type     && f.type   !== type)   return false;
    if (status   && f.status !== status) return false;
    if (f.status !== 'Overdue') {
      if (dateFrom && f.dateRaised && f.dateRaised < dateFrom) return false;
      if (dateTo   && f.dateRaised && f.dateRaised > dateTo)   return false;
    }
    if (search && !f.description.toLowerCase().includes(search) && !f.vessel.toLowerCase().includes(search)) return false;
    return true;
  }).sort(function(a,b) {
    var od = (order[a.status]||0) - (order[b.status]||0);
    return od !== 0 ? od : (b.dateRaised||'').localeCompare(a.dateRaised||'');
  });
  var tbody = document.getElementById('findingsBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><p>No findings match your filters.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(f, i) {
    return '<tr data-id="' + f.id + '" onclick="rowClick(event,this.dataset.id)" style="cursor:pointer;" >' +
      '<td style="color:var(--muted);font-size:.8rem;">' + (i+1) + '</td>' +
      '<td style="font-weight:600;">' + esc(f.vessel) + '</td>' +
      '<td><span class="badge badge-' + f.type.toLowerCase() + '">' + f.type + '</span></td>' +
      '<td><div style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(f.description) + '">' + esc(f.description) + '</div></td>' +
      '<td style="white-space:nowrap;">' + fmtDate(f.dateRaised) + '</td>' +
      '<td style="white-space:nowrap;">' + (f.deadline ? fmtDate(f.deadline) : '&#8212;') + '</td>' +
      '<td style="white-space:nowrap;">' + (f.dateClosed  ? fmtDate(f.dateClosed)  : '&#8212;') + '</td>' +
      '<td><span class="badge badge-' + f.status.toLowerCase() + '">' + f.status + '</span></td>' +
      '<td style="white-space:nowrap;" onclick="event.stopPropagation()">' +
        '<button class="btn-action" data-id="' + f.id + '" onclick="openEditModal(this.dataset.id)">Edit</button>' +
      '</td></tr>';
  }).join('');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Finding';
  ['fVessel','fType','fDesc','fTargetClose','fRootCause','fCorrectiveAction','fDateClosed'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('fDateRaised').value = new Date().toISOString().slice(0,10);
  document.getElementById('fStatus').value = 'Open';
  document.getElementById('addModal').classList.add('open');
}
function openEditModal(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Finding';
  document.getElementById('fVessel').value = f.vessel;
  document.getElementById('fType').value   = f.type;
  document.getElementById('fDesc').value   = f.description;
  document.getElementById('fDateRaised').value  = f.dateRaised  || '';
  document.getElementById('fTargetClose').value = f.deadline || '';
  document.getElementById('fRootCause').value   = f.rootCause   || '';
  document.getElementById('fCorrectiveAction').value = f.correctiveAction || '';
  document.getElementById('fStatus').value    = f.status==='Overdue' ? 'Open' : f.status;
  document.getElementById('fDateClosed').value = f.dateClosed || '';
  closeModal('detailModal');
  document.getElementById('addModal').classList.add('open');
}
function saveFinding() {
  var vessel   = document.getElementById('fVessel').value.trim();
  var type     = document.getElementById('fType').value;
  var desc     = document.getElementById('fDesc').value.trim();
  var dateRaised = document.getElementById('fDateRaised').value;
  if (!vessel||!type||!desc||!dateRaised) { alert('Please fill in all required fields.'); return; }
  var status      = document.getElementById('fStatus').value;
  var targetClose = document.getElementById('fTargetClose').value;
  var today = new Date().toISOString().slice(0,10);
  var finalStatus = (status==='Open' && targetClose && targetClose<today) ? 'Overdue' : status;
  var record = { vessel:vessel, type:type, description:desc, dateRaised:dateRaised,
    deadline:targetClose, rootCause:document.getElementById('fRootCause').value.trim(),
    correctiveAction:document.getElementById('fCorrectiveAction').value.trim(),
    status:finalStatus, dateClosed:status==='Closed'?document.getElementById('fDateClosed').value:'' };
  if (editingId) {
    var idx = findings.findIndex(function(f){return f.id===editingId;});
    if (idx>-1) findings[idx] = Object.assign(findings[idx], record);
  } else {
    record.id = 'f_' + Date.now();
    record.createdAt = new Date().toISOString();
    findings.push(record);
  }
  save(); closeModal('addModal'); renderDashboard(); renderTable();
}
function openDetail(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  var typeNames = {NC:'Non-Conformity',NM:'Near Miss',OBS:'Observation'};
  document.getElementById('detailBody').innerHTML =
    '<div style="display:flex;gap:10px;margin-bottom:18px;">' +
      '<span class="badge badge-' + f.type.toLowerCase() + '">' + (typeNames[f.type]||f.type) + '</span>' +
      '<span class="badge badge-' + f.status.toLowerCase() + '">' + f.status + '</span>' +
    '</div>' +
    '<div class="detail-row"><span class="detail-label">Vessel</span><span>' + esc(f.vessel) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Description</span><span>' + esc(f.description) + '</span></div>' +
    '<hr class="detail-divider">' +
    '<div class="detail-row"><span class="detail-label">Date Raised</span><span>' + fmtDate(f.dateRaised) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Target Close</span><span>' + (f.deadline?fmtDate(f.deadline):'&#8212;') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Date Closed</span><span>' + (f.dateClosed?fmtDate(f.dateClosed):'&#8212;') + '</span></div>' +
    '<hr class="detail-divider">' +
    '<div class="detail-row"><span class="detail-label">Root Cause</span><span>' + (f.rootCause ? esc(f.rootCause) : '—') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Corrective Action</span><span>' + (f.correctiveAction ? esc(f.correctiveAction) : '—') + '</span></div>';
  var footer =
    '<button class="btn-outline" onclick="closeModal(this.dataset.m)" data-m="detailModal">Close</button>' +
    '<button class="btn-action" style="padding:8px 18px;" data-id="' + f.id + '" onclick="openEditModal(this.dataset.id)">Edit</button>';
  if (f.detailUrl) footer += '<a class="btn btn-primary" href="' + f.detailUrl + '" target="_blank" rel="noopener" style="text-decoration:none;">Edit in Konsult &#8599;</a>';
  if (f.status !== 'Closed') footer += '<button class="btn btn-primary" data-id="' + f.id + '" onclick="closeOutFinding(this.dataset.id)">Mark as Closed</button>';
  footer += '<button class="btn btn-danger" data-id="' + f.id + '" onclick="deleteFinding(this.dataset.id)">Delete</button>';
  document.getElementById('detailFooter').innerHTML = footer;
  document.getElementById('detailModal').classList.add('open');
}
function closeOutFinding(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  if (!confirm('Mark this finding as Closed?')) return;
  f.status = 'Closed'; f.dateClosed = new Date().toISOString().slice(0,10);
  save(); closeModal('detailModal'); renderDashboard(); renderTable();
}
function deleteFinding(id) {
  if (!confirm('Delete this finding? This cannot be undone.')) return;
  findings = findings.filter(function(x){return x.id!==id;});
  save(); closeModal('detailModal'); renderDashboard(); renderTable();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===o) o.classList.remove('open'); });
});
function fmtDate(d) {
  if(!d) return '&#8212;';
  var p = d.split('-');
  var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(p[2]) + ' ' + m[parseInt(p[1])-1] + ' ' + p[0];
}
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

});
