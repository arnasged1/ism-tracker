<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping.fo - Deviation Management</title>
<style>
:root{--primary:#1a3a5c;--site-blue:#1a5ea8;--bg:#f3f6fb;--card:#fff;--border:#dce5f0;--text:#1c2833;--muted:#7a90a8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
header{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
header h1{font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:10px;color:#1a3a5c;}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:#1a5ea8;color:#fff;}.btn-primary:hover{background:#164e8e;}
.btn-danger{background:#e74c3c;color:#fff;}.btn-danger:hover{background:#c0392b;}
.btn-sm{padding:5px 11px;font-size:.78rem;}
.btn-outline{background:none;border:0.5px solid var(--border);color:var(--text);padding:8px 18px;border-radius:6px;cursor:pointer;font-size:.875rem;font-weight:600;}
.btn-outline:hover{background:var(--bg);}
.btn-action{background:#eef3f9;color:#1a5ea8;border:0.5px solid #9ab8d8;padding:5px 11px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-action:hover{background:#ddeaf7;}
nav{display:flex;background:#fff;padding:0 32px;border-bottom:1px solid var(--border);}
.nav-tab{padding:12px 22px;color:#7a90a8;cursor:pointer;font-size:.875rem;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;user-select:none;}
.nav-tab:hover{color:#1a5ea8;}.nav-tab.active{color:#1a5ea8;border-bottom-color:#1a5ea8;font-weight:600;}
main{padding:28px 32px;}
.section{display:none;}.section.active{display:block;}
.dash-filter{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.dash-filter label{font-size:.82rem;font-weight:600;color:var(--muted);}
.preset-btn{padding:5px 12px;border-radius:5px;border:0.5px solid var(--border);background:#fff;color:#4a6280;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;}
.preset-btn:hover{background:#eef3f9;border-color:#9ab8d8;color:#1a5ea8;}
.preset-btn.active{background:#1a5ea8;border-color:#1a5ea8;color:#fff;}
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px;}
.summary-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;border-top:3px solid #ccc;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer;transition:box-shadow .15s,transform .15s;}.summary-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-2px);}
.s-num{font-size:1.9rem;font-weight:700;line-height:1;}
.s-lbl{font-size:.8rem;font-weight:600;color:#3a5070;margin-top:4px;}
.s-sub{font-size:.7rem;color:var(--muted);margin-top:2px;}
.vessel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;}
.vessel-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.vessel-card-header{background:var(--primary);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s;}.vessel-card-header:hover{background:#254f7a;}
.vessel-card-header h3{font-size:1rem;font-weight:600;}
.vessel-badge{background:rgba(255,255,255,0.18);border-radius:20px;padding:3px 10px;font-size:.78rem;}
.vessel-card-body{padding:14px 16px;}
.type-row{display:grid;grid-template-columns:100px 1fr 1fr 1fr;align-items:center;padding:7px 0;border-bottom:0.5px solid #eef2f7;gap:8px;}
.type-row:last-child{border-bottom:none;}
.type-label{font-size:.72rem;font-weight:600;letter-spacing:.6px;padding:3px 8px;border-radius:3px;text-align:center;text-transform:uppercase;background:#f0f4f8;color:#4a6280;border-left:2px solid #9ab0c8;}
.type-nc{border-left-color:#9b5555;color:#7a3030;}.type-nm{border-left-color:#9b7a35;color:#7a5a1a;}.type-obs{border-left-color:#3a6fa8;color:#1a4a7a;}
.stat-box{text-align:center;background:#f8fafc;border-radius:5px;padding:5px 4px;}
.stat-num{font-size:1.2rem;font-weight:700;line-height:1;}
.stat-lbl{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.stat-raised .stat-num{color:#e74c3c;}.stat-closed .stat-num{color:#27ae60;}.stat-overdue .stat-num{color:#8e44ad;}
.filters{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.filters label{font-size:.82rem;font-weight:600;color:var(--muted);}
select,input[type="text"],input[type="date"],textarea{border:0.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.875rem;color:var(--text);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;}
select:focus,input:focus,textarea:focus{border-color:#1a5ea8;box-shadow:0 0 0 2px rgba(26,94,168,.1);}
.table-wrap{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
table{width:100%;border-collapse:collapse;font-size:.875rem;}
thead{background:var(--primary);color:#fff;}
thead th{padding:12px 14px;text-align:left;font-weight:600;font-size:.78rem;letter-spacing:.4px;white-space:nowrap;}
tbody tr{border-bottom:0.5px solid #eef2f7;transition:background .12s;}
tbody tr:hover{background:#f5f8fc;}
tbody tr:last-child{border-bottom:none;}
td{padding:11px 14px;vertical-align:middle;}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.3px;}
.badge-nc{background:#f5efef;color:#7a3030;border:0.5px solid #d0a0a0;}
.badge-nm{background:#f5f0e8;color:#7a5a1a;border:0.5px solid #d0b878;}
.badge-obs{background:#eef3f9;color:#1a4a7a;border:0.5px solid #9ab8d8;}
.badge-open{background:#f9eded;color:#a03030;border:0.5px solid #d8a8a8;}
.badge-closed{background:#eaf5ef;color:#276040;border:0.5px solid #90c8a8;}
.badge-overdue{background:#f2edf8;color:#60408a;border:0.5px solid #b898d8;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-header{background:var(--primary);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0;}
.modal-header h2{font-size:1.05rem;font-weight:600;}
.modal-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.8;line-height:1;}
.modal-close:hover{opacity:1;}
.modal-body{padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.82rem;font-weight:600;color:var(--primary);}
.form-group select,.form-group input,.form-group textarea{width:100%;}
textarea{resize:vertical;min-height:72px;}
.modal-footer{padding:16px 24px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.detail-row{display:flex;gap:8px;margin-bottom:12px;font-size:.9rem;}
.detail-label{font-weight:600;color:var(--primary);min-width:150px;flex-shrink:0;}
hr.detail-divider{border:none;border-top:0.5px solid var(--border);margin:14px 0;}
@media(max-width:700px){main{padding:16px;}.vessel-grid{grid-template-columns:1fr;}.summary-bar{grid-template-columns:repeat(2,1fr);}.form-grid{grid-template-columns:1fr;}header,nav{padding:0 16px;}}
</style>
</head>
<body>
<header>
  <h1>
    <img src="https://shipping.fo/Content/images/logo.svg" style="height:38px;width:auto;" onerror="this.style.display='none'">
    Shipping.fo &ndash; Deviation Management
  </h1>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Finding</button>
</header>
<nav>
  <div class="nav-tab active" onclick="showSection('dashboard',this)">Dashboard</div>
  <div class="nav-tab" onclick="showSection('findings',this)">All Findings</div>
</nav>
<main>
  <section id="dashboard" class="section active">
    <div class="dash-filter">
      <label>Date range</label>
      <input type="date" id="dashFrom" onchange="onDateChange()">
      <span style="color:var(--muted);font-size:.85rem;">to</span>
      <input type="date" id="dashTo" onchange="onDateChange()">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="preset-btn active" onclick="setPreset(this,1)">1 month</button>
        <button class="preset-btn" onclick="setPreset(this,3)">3 months</button>
        <button class="preset-btn" onclick="setPreset(this,6)">6 months</button>
        <button class="preset-btn" onclick="setPreset(this,12)">1 year</button>
        <button class="preset-btn" onclick="setPreset(this,0)">All time</button>
      </div>
      <span id="dashCount" style="margin-left:auto;font-size:.8rem;color:var(--muted);"></span>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="vessel-grid" id="vesselGrid"></div>
  </section>
  <section id="findings" class="section">
    <div class="filters">
      <label>Vessel</label>
      <select id="filterVessel" onchange="renderTable()"><option value="">All Vessels</option></select>
      <label>Type</label>
      <select id="filterType" onchange="renderTable()">
        <option value="">All Types</option>
        <option value="NC">Non-Conformity</option>
        <option value="NM">Near Miss</option>
        <option value="OBS">Observation</option>
      </select>
      <label>Status</label>
      <select id="filterStatus" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="Open">Open</option>
        <option value="Closed">Closed</option>
        <option value="Overdue">Overdue</option>
      </select>
      <label>From</label>
      <input type="date" id="filterFrom" onchange="renderTable()">
      <label>To</label>
      <input type="date" id="filterTo" onchange="renderTable()">
      <input type="text" id="filterSearch" placeholder="Search..." oninput="renderTable()" style="min-width:180px;">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Vessel</th><th>Type</th><th>Description</th><th>Date Raised</th><th>Target Close</th><th>Date Closed</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="findingsBody"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">Add New Finding</h2><button class="modal-close" onclick="closeModal('addModal')">&#215;</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Vessel *</label><select id="fVessel"><option value="">Select vessel...</option></select></div>
        <div class="form-group"><label>Type *</label>
          <select id="fType">
            <option value="">Select type...</option>
            <option value="NC">Non-Conformity (NC)</option>
            <option value="NM">Near Miss (NM)</option>
            <option value="OBS">Observation (OBS)</option>
          </select>
        </div>
        <div class="form-group full"><label>Description *</label><textarea id="fDesc" placeholder="Describe the finding..."></textarea></div>
        <div class="form-group"><label>Date Raised *</label><input type="date" id="fDateRaised"></div>
        <div class="form-group"><label>Target Close Date</label><input type="date" id="fTargetClose"></div>
        <div class="form-group full"><label>Root Cause</label><textarea id="fRootCause" placeholder="Root cause analysis..."></textarea></div>
        <div class="form-group full"><label>Corrective Action</label><textarea id="fCorrectiveAction" placeholder="Corrective / preventive action..."></textarea></div>
        <div class="form-group"><label>Status</label><select id="fStatus"><option value="Open">Open</option><option value="Closed">Closed</option></select></div>
        <div class="form-group"><label>Date Closed</label><input type="date" id="fDateClosed"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveFinding()">Save Finding</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h2>Finding Details</h2><button class="modal-close" onclick="closeModal('detailModal')">&#215;</button></div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

let findings = [], editingId = null;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    findings = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SEED));
    if (!raw) localStorage.setItem(STORAGE_KEY, JSON.stringify(findings));
  } catch(e) { findings = JSON.parse(JSON.stringify(SEED)); }
  refreshOverdue();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(findings)); }
function refreshOverdue() {
  const today = new Date().toISOString().slice(0,10);
  findings.forEach(function(f) {
    if (f.status === 'Open' && f.deadline && f.deadline < today) f.status = 'Overdue';
    if (f.status === 'Overdue' && (!f.deadline || f.deadline >= today)) f.status = 'Open';
  });
}

function showSection(id, tab, pushState) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  tab.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'findings') renderTable();
  if (pushState !== false) {
    history.pushState({section: id}, '', '#' + id);
  }
}

function populateVesselSelects() {
  ['fVessel','filterVessel'].forEach(function(id) {
    var el = document.getElementById(id);
    while (el.options.length > 1) el.remove(1);
    VESSELS.forEach(function(v) { var o = document.createElement('option'); o.value = o.textContent = v; el.appendChild(o); });
  });
}

function setPreset(btn, months) {
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var today = new Date();
  document.getElementById('dashTo').value = today.toISOString().slice(0,10);
  if (months === 0) {
    document.getElementById('dashFrom').value = '';
  } else {
    var from = new Date(today);
    from.setMonth(from.getMonth() - months);
    document.getElementById('dashFrom').value = from.toISOString().slice(0,10);
  }
  renderDashboard();
}
function onDateChange() {
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  renderDashboard();
}
function getFiltered() {
  var from = document.getElementById('dashFrom').value;
  var to   = document.getElementById('dashTo').value;
  return findings.filter(function(f) {
    if (from && f.dateRaised && f.dateRaised < from) return false;
    if (to   && f.dateRaised && f.dateRaised > to)   return false;
    return true;
  });
}

function renderDashboard() {
  var df = getFiltered();
  document.getElementById('dashCount').textContent = df.length + ' finding' + (df.length !== 1 ? 's' : '') + ' in range';
  renderSummaryBar(df);
  renderVesselCards(df);
}

function sCard(lbl, num, color, sub, filterType, filterStatus) {
  var onclick = '';
  if (filterType)   onclick = 'drillDown(\'\',\''+filterType+'\',\'\')';
  if (filterStatus) onclick = 'drillDown(\'\',\'\',\''+filterStatus+'\')';
  if (lbl==='Total findings') onclick = 'drillDown(\'\',\'\',\'\')';
  return '<div class="summary-card" style="border-top-color:' + color + '" onclick="' + onclick + '">' +
    '<div class="s-num" style="color:' + color + '">' + num + '</div>' +
    '<div class="s-lbl">' + lbl + '</div>' +
    '<div class="s-sub">' + sub + '</div></div>';
}

function rowClick(e, id) {
  if (e.target.closest('button')) return;
  openDetail(id);
}

function drillDownVessel(vessel) {
  drillDown(vessel, '', '');
}

function drillDownVesselType(vessel, type) {
  drillDown(vessel, type, '');
}

function drillDownOverdue(vessel, type) {
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = 'Overdue';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}
function drillDown(vessel, type, status) {
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = status || '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = document.getElementById('dashFrom').value;
  document.getElementById('filterTo').value     = document.getElementById('dashTo').value;
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}

function renderSummaryBar(df) {
  var total   = findings.length;
  var nc      = df.filter(function(f){return f.type==='NC';}).length;
  var nm      = df.filter(function(f){return f.type==='NM';}).length;
  var obs     = df.filter(function(f){return f.type==='OBS';}).length;
  var open    = df.filter(function(f){return f.status==='Open';}).length;
  var overdue = findings.filter(function(f){return f.status==='Overdue';}).length;
  document.getElementById('summaryBar').innerHTML =
    sCard('Total findings',   total,   '#1a3a5c', 'all time',  '',    ''       ) +
    sCard('Non-conformities', nc,      '#9b5555', 'in period', 'NC',  ''       ) +
    sCard('Near misses',      nm,      '#9b7a35', 'in period', 'NM',  ''       ) +
    sCard('Observations',     obs,     '#1a5ea8', 'in period', 'OBS', ''       ) +
    sCard('Open',             open,    '#a03030', 'in period', '',    'Open'   ) +
    '<div class="summary-card" style="border-top-color:#60408a" onclick="drillDownOverdue(\'\',\'\')"><div class="s-num" style="color:#60408a">' + overdue + '</div><div class="s-lbl">Overdue</div><div class="s-sub">fleet-wide</div></div>';
}

function renderVesselCards(df) {
  var grid = document.getElementById('vesselGrid');
  grid.innerHTML = '';
  VESSELS.forEach(function(vessel) {
    var vf = df.filter(function(f){return f.vessel===vessel;});
    var total = vf.length;
    var rows = ['NC','NM','OBS'].map(function(type) {
      var tf = vf.filter(function(f){return f.type===type;});
      var raised  = tf.length;
      var closed  = tf.filter(function(f){return f.status==='Closed';}).length;
      var overdue = findings.filter(function(f){return f.vessel===vessel && f.type===type && f.status==='Overdue';}).length;
      return '<div class="type-row" style="cursor:pointer;" onclick="drillDownVesselType(\''+vessel+'\',\''+type+'\')" title="View ' + type + ' for ' + vessel + '">' +
        '<span class="type-label type-' + type.toLowerCase() + '">' + type + '</span>' +
        '<div class="stat-box stat-raised"><div class="stat-num">' + raised + '</div><div class="stat-lbl">Raised</div></div>' +
        '<div class="stat-box stat-closed"><div class="stat-num">' + closed + '</div><div class="stat-lbl">Closed</div></div>' +
        '<div class="stat-box stat-overdue"><div class="stat-num">' + overdue + '</div><div class="stat-lbl">Overdue</div></div>' +
        '</div>';
    }).join('');
    grid.innerHTML +=
      '<div class="vessel-card">' +
        '<div class="vessel-card-header" onclick="drillDownVessel(\''+vessel+'\')" title="Click to view all findings for this vessel"><h3>' + vessel + '</h3><span class="vessel-badge">' + total + ' finding' + (total!==1?'s':'') + ' &rsaquo;</span></div>' +
        '<div class="vessel-card-body">' +
          '<div style="display:grid;grid-template-columns:100px 1fr 1fr 1fr;gap:8px;padding:0 0 8px;border-bottom:0.5px solid #eef2f7;margin-bottom:4px;">' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;">TYPE</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">RAISED</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">CLOSED</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">OVERDUE</span>' +
          '</div>' + rows +
        '</div></div>';
  });
}

function renderTable() {
  var vessel = document.getElementById('filterVessel').value;
  var type   = document.getElementById('filterType').value;
  var status = document.getElementById('filterStatus').value;
  var search = document.getElementById('filterSearch').value.toLowerCase();
  var order  = {Overdue:0,Open:1,Closed:2};
  var dateFrom = document.getElementById('filterFrom').value;
  var dateTo   = document.getElementById('filterTo').value;
  var filtered = findings.filter(function(f) {
    if (vessel   && f.vessel !== vessel) return false;
    if (type     && f.type   !== type)   return false;
    if (status   && f.status !== status) return false;
    if (dateFrom && f.dateRaised && f.dateRaised < dateFrom) return false;
    if (dateTo   && f.dateRaised && f.dateRaised > dateTo)   return false;
    if (search && !f.description.toLowerCase().includes(search) && !f.vessel.toLowerCase().includes(search)) return false;
    return true;
  }).sort(function(a,b) {
    var od = (order[a.status]||0) - (order[b.status]||0);
    return od !== 0 ? od : (b.dateRaised||'').localeCompare(a.dateRaised||'');
  });
  var tbody = document.getElementById('findingsBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><p>No findings match your filters.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(f, i) {
    return '<tr data-id="' + f.id + '" onclick="rowClick(event,this.dataset.id)" style="cursor:pointer;" >' +
      '<td style="color:var(--muted);font-size:.8rem;">' + (i+1) + '</td>' +
      '<td style="font-weight:600;">' + esc(f.vessel) + '</td>' +
      '<td><span class="badge badge-' + f.type.toLowerCase() + '">' + f.type + '</span></td>' +
      '<td><div style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(f.description) + '">' + esc(f.description) + '</div></td>' +
      '<td style="white-space:nowrap;">' + fmtDate(f.dateRaised) + '</td>' +
      '<td style="white-space:nowrap;">' + (f.deadline ? fmtDate(f.deadline) : '&#8212;') + '</td>' +
      '<td style="white-space:nowrap;">' + (f.dateClosed  ? fmtDate(f.dateClosed)  : '&#8212;') + '</td>' +
      '<td><span class="badge badge-' + f.status.toLowerCase() + '">' + f.status + '</span></td>' +
      '<td style="white-space:nowrap;" onclick="event.stopPropagation()">' +
        '<button class="btn-action" data-id="' + f.id + '" onclick="openEditModal(this.dataset.id)">Edit</button>' +
      '</td></tr>';
  }).join('');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Finding';
  ['fVessel','fType','fDesc','fTargetClose','fRootCause','fCorrectiveAction','fDateClosed'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('fDateRaised').value = new Date().toISOString().slice(0,10);
  document.getElementById('fStatus').value = 'Open';
  document.getElementById('addModal').classList.add('open');
}
function openEditModal(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Finding';
  document.getElementById('fVessel').value = f.vessel;
  document.getElementById('fType').value   = f.type;
  document.getElementById('fDesc').value   = f.description;
  document.getElementById('fDateRaised').value  = f.dateRaised  || '';
  document.getElementById('fTargetClose').value = f.deadline || '';
  document.getElementById('fRootCause').value   = f.rootCause   || '';
  document.getElementById('fCorrectiveAction').value = f.correctiveAction || '';
  document.getElementById('fStatus').value    = f.status==='Overdue' ? 'Open' : f.status;
  document.getElementById('fDateClosed').value = f.dateClosed || '';
  closeModal('detailModal');
  document.getElementById('addModal').classList.add('open');
}
function saveFinding() {
  var vessel   = document.getElementById('fVessel').value.trim();
  var type     = document.getElementById('fType').value;
  var desc     = document.getElementById('fDesc').value.trim();
  var dateRaised = document.getElementById('fDateRaised').value;
  if (!vessel||!type||!desc||!dateRaised) { alert('Please fill in all required fields.'); return; }
  var status      = document.getElementById('fStatus').value;
  var targetClose = document.getElementById('fTargetClose').value;
  var today = new Date().toISOString().slice(0,10);
  var finalStatus = (status==='Open' && targetClose && targetClose<today) ? 'Overdue' : status;
  var record = { vessel:vessel, type:type, description:desc, dateRaised:dateRaised,
    deadline:targetClose, rootCause:document.getElementById('fRootCause').value.trim(),
    correctiveAction:document.getElementById('fCorrectiveAction').value.trim(),
    status:finalStatus, dateClosed:status==='Closed'?document.getElementById('fDateClosed').value:'' };
  if (editingId) {
    var idx = findings.findIndex(function(f){return f.id===editingId;});
    if (idx>-1) findings[idx] = Object.assign(findings[idx], record);
  } else {
    record.id = 'f_' + Date.now();
    record.createdAt = new Date().toISOString();
    findings.push(record);
  }
  save(); closeModal('addModal'); renderDashboard(); renderTable();
}
function openDetail(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  var typeNames = {NC:'Non-Conformity',NM:'Near Miss',OBS:'Observation'};
  document.getElementById('detailBody').innerHTML =
    '<div style="display:flex;gap:10px;margin-bottom:18px;">' +
      '<span class="badge badge-' + f.type.toLowerCase() + '">' + (typeNames[f.type]||f.type) + '</span>' +
      '<span class="badge badge-' + f.status.toLowerCase() + '">' + f.status + '</span>' +
    '</div>' +
    '<div class="detail-row"><span class="detail-label">Vessel</span><span>' + esc(f.vessel) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Description</span><span>' + esc(f.description) + '</span></div>' +
    '<hr class="detail-divider">' +
    '<div class="detail-row"><span class="detail-label">Date Raised</span><span>' + fmtDate(f.dateRaised) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Target Close</span><span>' + (f.deadline?fmtDate(f.deadline):'&#8212;') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Date Closed</span><span>' + (f.dateClosed?fmtDate(f.dateClosed):'&#8212;') + '</span></div>' +
    '<hr class="detail-divider">' +
    '<div class="detail-row"><span class="detail-label">Root Cause</span><span>' + esc(f.rootCause||'&#8212;') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Corrective Action</span><span>' + esc(f.correctiveAction||'&#8212;') + '</span></div>';
  var footer =
    '<button class="btn-outline" onclick="closeModal(this.dataset.m)" data-m="detailModal">Close</button>' +
    '<button class="btn-action" style="padding:8px 18px;" data-id="' + f.id + '" onclick="openEditModal(this.dataset.id)">Edit</button>';
  if (f.status !== 'Closed') footer += '<button class="btn btn-primary" data-id="' + f.id + '" onclick="closeOutFinding(this.dataset.id)">Mark as Closed</button>';
  footer += '<button class="btn btn-danger" data-id="' + f.id + '" onclick="deleteFinding(this.dataset.id)">Delete</button>';
  document.getElementById('detailFooter').innerHTML = footer;
  document.getElementById('detailModal').classList.add('open');
}
function closeOutFinding(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  if (!confirm('Mark this finding as Closed?')) return;
  f.status = 'Closed'; f.dateClosed = new Date().toISOString().slice(0,10);
  save(); closeModal('detailModal'); renderDashboard(); renderTable();
}
function deleteFinding(id) {
  if (!confirm('Delete this finding? This cannot be undone.')) return;
  findings = findings.filter(function(x){return x.id!==id;});
  save(); closeModal('detailModal'); renderDashboard(); renderTable();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===o) o.classList.remove('open'); });
});
function fmtDate(d) {
  if(!d) return '&#8212;';
  var p = d.split('-');
  var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(p[2]) + ' ' + m[parseInt(p[1])-1] + ' ' + p[0];
}
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// HISTORY — back/forward button support
window.addEventListener('popstate', function(e) {
  var id = (e.state && e.state.section) ? e.state.section : 'dashboard';
  var tab = document.querySelector('.nav-tab:nth-child(' + (id === 'findings' ? '2' : '1') + ')');
  showSection(id, tab, false);
});

// INIT
load();
populateVesselSelects();
var _t = new Date(), _f = new Date(_t);
_f.setMonth(_f.getMonth()-1);
document.getElementById('dashTo').value   = _t.toISOString().slice(0,10);
document.getElementById('dashFrom').value = _f.toISOString().slice(0,10);
renderDashboard();
renderTable();
history.replaceState({section: 'dashboard'}, '', '#dashboard');
</script>
</body>
