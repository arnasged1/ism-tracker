<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping.fo - Deviation Management</title>
<style>
:root{--primary:#1a3a5c;--site-blue:#1a5ea8;--bg:#f3f6fb;--card:#fff;--border:#dce5f0;--text:#1c2833;--muted:#7a90a8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
header{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
header h1{font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:10px;color:#1a3a5c;}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:#1a5ea8;color:#fff;}.btn-primary:hover{background:#164e8e;}
.btn-danger{background:#e74c3c;color:#fff;}.btn-danger:hover{background:#c0392b;}
.btn-sm{padding:5px 11px;font-size:.78rem;}
.btn-outline{background:none;border:0.5px solid var(--border);color:var(--text);padding:8px 18px;border-radius:6px;cursor:pointer;font-size:.875rem;font-weight:600;}
.btn-outline:hover{background:var(--bg);}
.btn-action{background:#eef3f9;color:#1a5ea8;border:0.5px solid #9ab8d8;padding:5px 11px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-action:hover{background:#ddeaf7;}
nav{display:flex;background:#fff;padding:0 32px;border-bottom:1px solid var(--border);}
.nav-tab{padding:12px 22px;color:#7a90a8;cursor:pointer;font-size:.875rem;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;user-select:none;}
.nav-tab:hover{color:#1a5ea8;}.nav-tab.active{color:#1a5ea8;border-bottom-color:#1a5ea8;font-weight:600;}
main{padding:28px 32px;}
.section{display:none;}.section.active{display:block;}
.dash-filter{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.dash-filter label{font-size:.82rem;font-weight:600;color:var(--muted);}
.preset-btn{padding:5px 12px;border-radius:5px;border:0.5px solid var(--border);background:#fff;color:#4a6280;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;}
.preset-btn:hover{background:#eef3f9;border-color:#9ab8d8;color:#1a5ea8;}
.preset-btn.active{background:#1a5ea8;border-color:#1a5ea8;color:#fff;}
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px;}
.summary-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;border-top:3px solid #ccc;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer;transition:box-shadow .15s,transform .15s;}.summary-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-2px);}
.s-num{font-size:1.9rem;font-weight:700;line-height:1;}
.s-lbl{font-size:.8rem;font-weight:600;color:#3a5070;margin-top:4px;}
.s-sub{font-size:.7rem;color:var(--muted);margin-top:2px;}
.vessel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;}
.vessel-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.vessel-card-header{background:var(--primary);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s;}.vessel-card-header:hover{background:#254f7a;}
.vessel-card-header h3{font-size:1rem;font-weight:600;}
.vessel-badge{background:rgba(255,255,255,0.18);border-radius:20px;padding:3px 10px;font-size:.78rem;}
.vessel-card-body{padding:14px 16px;}
.type-row{display:grid;grid-template-columns:100px 1fr 1fr 1fr;align-items:center;padding:7px 0;border-bottom:0.5px solid #eef2f7;gap:8px;}
.type-row:last-child{border-bottom:none;}
.type-label{font-size:.72rem;font-weight:600;letter-spacing:.6px;padding:3px 8px;border-radius:3px;text-align:center;text-transform:uppercase;background:#f0f4f8;color:#4a6280;border-left:2px solid #9ab0c8;}
.type-nc{border-left-color:#9b5555;color:#7a3030;}.type-nm{border-left-color:#9b7a35;color:#7a5a1a;}.type-obs{border-left-color:#3a6fa8;color:#1a4a7a;}
.stat-box{text-align:center;background:#f8fafc;border-radius:5px;padding:5px 4px;}
.stat-num{font-size:1.2rem;font-weight:700;line-height:1;}
.stat-lbl{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.stat-raised .stat-num{color:#e74c3c;}.stat-closed .stat-num{color:#27ae60;}.stat-overdue .stat-num{color:#8e44ad;}
.filters{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.filters label{font-size:.82rem;font-weight:600;color:var(--muted);}
select,input[type="text"],input[type="date"],textarea{border:0.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.875rem;color:var(--text);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;}
select:focus,input:focus,textarea:focus{border-color:#1a5ea8;box-shadow:0 0 0 2px rgba(26,94,168,.1);}
.table-wrap{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
table{width:100%;border-collapse:collapse;font-size:.875rem;}
thead{background:var(--primary);color:#fff;}
thead th{padding:12px 14px;text-align:left;font-weight:600;font-size:.78rem;letter-spacing:.4px;white-space:nowrap;}
tbody tr{border-bottom:0.5px solid #eef2f7;transition:background .12s;}
tbody tr:hover{background:#f5f8fc;}
tbody tr:last-child{border-bottom:none;}
td{padding:11px 14px;vertical-align:middle;}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.3px;}
.badge-nc{background:#f5efef;color:#7a3030;border:0.5px solid #d0a0a0;}
.badge-nm{background:#f5f0e8;color:#7a5a1a;border:0.5px solid #d0b878;}
.badge-obs{background:#eef3f9;color:#1a4a7a;border:0.5px solid #9ab8d8;}
.badge-open{background:#f9eded;color:#a03030;border:0.5px solid #d8a8a8;}
.badge-closed{background:#eaf5ef;color:#276040;border:0.5px solid #90c8a8;}
.badge-overdue{background:#f2edf8;color:#60408a;border:0.5px solid #b898d8;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-header{background:var(--primary);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0;}
.modal-header h2{font-size:1.05rem;font-weight:600;}
.modal-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.8;line-height:1;}
.modal-close:hover{opacity:1;}
.modal-body{padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.82rem;font-weight:600;color:var(--primary);}
.form-group select,.form-group input,.form-group textarea{width:100%;}
textarea{resize:vertical;min-height:72px;}
.modal-footer{padding:16px 24px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.detail-row{display:flex;gap:8px;margin-bottom:12px;font-size:.9rem;}
.detail-label{font-weight:600;color:var(--primary);min-width:150px;flex-shrink:0;}
hr.detail-divider{border:none;border-top:0.5px solid var(--border);margin:14px 0;}
@media(max-width:700px){main{padding:16px;}.vessel-grid{grid-template-columns:1fr;}.summary-bar{grid-template-columns:repeat(2,1fr);}.form-grid{grid-template-columns:1fr;}header,nav{padding:0 16px;}}
</style>
</head>
<body>
<header>
  <h1>
    <img src="https://shipping.fo/Content/images/logo.svg" style="height:38px;width:auto;" onerror="this.style.display='none'">
    Shipping.fo &ndash; Deviation Management
  </h1>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Finding</button>
</header>
<nav>
  <div class="nav-tab active" onclick="showSection('dashboard',this)">Dashboard</div>
  <div class="nav-tab" onclick="showSection('findings',this)">All Findings</div>
</nav>
<main>
  <section id="dashboard" class="section active">
    <div class="dash-filter">
      <label>Date range</label>
      <input type="date" id="dashFrom" onchange="onDateChange()">
      <span style="color:var(--muted);font-size:.85rem;">to</span>
      <input type="date" id="dashTo" onchange="onDateChange()">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="preset-btn active" onclick="setPreset(this,1)">1 month</button>
        <button class="preset-btn" onclick="setPreset(this,3)">3 months</button>
        <button class="preset-btn" onclick="setPreset(this,6)">6 months</button>
        <button class="preset-btn" onclick="setPreset(this,12)">1 year</button>
        <button class="preset-btn" onclick="setPreset(this,0)">All time</button>
      </div>
      <span id="dashCount" style="margin-left:auto;font-size:.8rem;color:var(--muted);"></span>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="vessel-grid" id="vesselGrid"></div>
  </section>
  <section id="findings" class="section">
    <div class="filters">
      <label>Vessel</label>
      <select id="filterVessel" onchange="renderTable()"><option value="">All Vessels</option></select>
      <label>Type</label>
      <select id="filterType" onchange="renderTable()">
        <option value="">All Types</option>
        <option value="NC">Non-Conformity</option>
        <option value="NM">Near Miss</option>
        <option value="OBS">Observation</option>
      </select>
      <label>Status</label>
      <select id="filterStatus" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="Open">Open</option>
        <option value="Closed">Closed</option>
        <option value="Overdue">Overdue</option>
      </select>
      <label>From</label>
      <input type="date" id="filterFrom" onchange="resetDrillMode();renderTable()">
      <label>To</label>
      <input type="date" id="filterTo" onchange="resetDrillMode();renderTable()">
      <input type="text" id="filterSearch" placeholder="Search..." oninput="renderTable()" style="min-width:180px;">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Vessel</th><th>Type</th><th>Description</th><th>Date Raised</th><th>Target Close</th><th>Date Closed</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="findingsBody"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">Add New Finding</h2><button class="modal-close" onclick="closeModal('addModal')">&#215;</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Vessel *</label><select id="fVessel"><option value="">Select vessel...</option></select></div>
        <div class="form-group"><label>Type *</label>
          <select id="fType">
            <option value="">Select type...</option>
            <option value="NC">Non-Conformity (NC)</option>
            <option value="NM">Near Miss (NM)</option>
            <option value="OBS">Observation (OBS)</option>
          </select>
        </div>
        <div class="form-group full"><label>Description *</label><textarea id="fDesc" placeholder="Describe the finding..."></textarea></div>
        <div class="form-group"><label>Date Raised *</label><input type="date" id="fDateRaised"></div>
        <div class="form-group"><label>Target Close Date</label><input type="date" id="fTargetClose"></div>
        <div class="form-group full"><label>Root Cause</label><textarea id="fRootCause" placeholder="Root cause analysis..."></textarea></div>
        <div class="form-group full"><label>Corrective Action</label><textarea id="fCorrectiveAction" placeholder="Corrective / preventive action..."></textarea></div>
        <div class="form-group"><label>Status</label><select id="fStatus"><option value="Open">Open</option><option value="Closed">Closed</option></select></div>
        <div class="form-group"><label>Date Closed</label><input type="date" id="fDateClosed"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveFinding()">Save Finding</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h2>Finding Details</h2><button class="modal-close" onclick="closeModal('detailModal')">&#215;</button></div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

g materials will help ensure that all personnel are adequately informed, properly trained, and capable of responding effectively in emergency situations.", "dateRaised": "2026-03-20", "deadline": "2026-04-20", "status": "Overdue", "correctiveAction": "Issue discussed with the Master.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/817/frontpage-ism-audit-rec-1-training-manuals?start=0", "rootCause": "Incomplete procedure", "managementComment": "", "finalManagementComment": ""}, {"id": "1e67317e-a8f4-4acc-875d-ff66d903a2d0", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #5 - Deck crane not inspedted", "description": "During the audit, it was noted that no valid certificate could be produced to confirm that the deck crane had undergone its required annual inspection. In accordance with applicable regulations and industry standards, deck cranes must be inspected and certified by an authorized and competent company at least once every 12 months. The absence of such documentation raises concerns regarding both regulatory compliance and the safe operation of the equipment, as regular inspections are essential to verify the crane’s structural integrity, operational reliability, and overall safety.", "dateRaised": "2026-03-20", "deadline": "2026-04-10", "status": "Overdue", "correctiveAction": "The master instructed to arrange inspection of the deck crane as soon as possible.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/816/frontpage-ism-audit-nc-5-deck-crane-not-inspedted?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "ba6293b8-0e12-49ed-b311-ffe84e220bfb", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #5 - Sterring Gear pumps", "description": "During the audit, it was identified that the hydraulic power unit for the steering gear is equipped with only a single hydraulic pump. This configuration presents a potential risk, as the failure of the sole pump could result in a loss of steering capability, thereby creating a hazardous situation for the vessel, particularly during critical operations such as maneuvering in confined waters or adverse conditions. It is therefore recommended that consideration be given to installing a second, independent hydraulic pump in order to provide redundancy. Such an arrangement would enhance the overall reliability of the steering system, improve operational safety, and ensure continued manoeuvrability in the event of equipment failure.", "dateRaised": "2026-03-20", "deadline": "2026-04-10", "status": "Overdue", "correctiveAction": "N/A", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/815/frontpage-ism-audit-obs-5-sterring-gear-pumps?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": ""}, {"id": "e2655a2c-8952-439f-ada8-b0b5dca8429f", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #4 - No UKC specified", "description": "During the audit, it was identified that the required Under Keel Clearance (UKC) was neither defined in the Master’s Standing Orders nor addressed within the vessel’s procedures for passage planning. The absence of clearly specified UKC criteria may lead to inconsistencies in voyage planning and execution, and does not align with best practice for ensuring safe navigation, particularly in confined or shallow waters.", "dateRaised": "2026-03-20", "deadline": "2026-04-01", "status": "Overdue", "correctiveAction": "Master instructed to rectify", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/814/frontpage-ism-audit-obs-4-no-ukc-specified?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "", "finalManagementComment": ""}, {"id": "76f8d9c9-0ace-4e01-a679-386e3ff7c93e", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #3 - Standing Orders", "description": "During the audit, it was established that the Master’s Standing Orders had not been signed by all navigation officers, and that the Chief Engineer’s Standing Orders were not available onboard.", "dateRaised": "2026-03-19", "deadline": "2026-03-19", "status": "Overdue", "correctiveAction": "Master instructed to rectify before departure.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/813/frontpage-ism-audit-obs-3-standing-orders?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "", "finalManagementComment": ""}, {"id": "38240196-c352-4fff-a020-5363a5953fef", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS # 2 - Risk Assessments.", "description": "During the audit, it was observed that only a limited number of risk assessments were available onboard. In accordance with the requirements of the International Safety Management (ISM) Code, risk assessments must be systematically conducted for all operations and tasks that may pose a potential hazard to the vessel, its crew, or the environment. The absence of sufficient documented risk assessments indicates that this requirement is not being fully implemented, and it raises concerns regarding the vessel’s ability to adequately identify, evaluate, and mitigate operational risks.", "dateRaised": "2026-03-19", "deadline": "2026-04-09", "status": "Overdue", "correctiveAction": "The Master is instructed to ensure that risk assessments are conducted in full compliance with the requirements of the applicable code.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/812/frontpage-ism-audit-obs-2-risk-assessments?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "892b79d1-90d5-4bb2-b86e-8181b303dd94", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #1 - Nautical publicatios outdated.", "description": "During the audit, it was identified that the IAMSAR Manual onboard was the 2022 edition. Nautical publications are required to be maintained in their latest available editions, and therefore this does not meet the applicable requirements.", "dateRaised": "2026-03-19", "deadline": "2026-04-02", "status": "Overdue", "correctiveAction": "The Master instructed to replace IAMSAR as soon as possible.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/811/frontpage-ism-audit-obs-1-nautical-publicatios-outdated?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "d7af4fed-ec95-4f0b-9610-991c9604629a", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #4 - Material Data SHeets", "description": "During the audit, a number of chemical substances were identified onboard; however, the corresponding Material Safety Data Sheets (MSDS) could not be produced upon request. This indicates that the vessel does not maintain adequate documentation for hazardous materials, as required, and raises concerns regarding the crew’s ability to access critical safety information related to handling, storage, and emergency response procedures for these substances.", "dateRaised": "2026-03-19", "deadline": "2026-04-08", "status": "Overdue", "correctiveAction": "The Master was instructed to review and rationalize all chemicals onboard, ensuring that only approved substances are retained and that each is accompanied by the appropriate Material Safety Data Sheet (MSDS).", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/810/frontpage-ism-audit-nc-4-material-data-sheets?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "61d453da-b7bc-4e6b-9ba2-343fc1c66e3e", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #3 - Emergency Drills", "description": "During the audit, it was determined that not all crew members had participated in emergency drills within the past month, meaning the vessel is not in compliance with SOLAS regulations. Engineers and Ordinary Seamen are engaged on a trip-by-trip basis rather than on a fixed schedule, resulting in the vessel departing port with approximately two-thirds of the crew having not taken part in a drill during the preceding month.", "dateRaised": "2026-03-19", "deadline": "2026-04-02", "status": "Overdue", "correctiveAction": "The Master is instructed not to depart from port before all crewmembers has participated i an emergency drill.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/809/frontpage-ism-audit-nc-3-emergency-drills?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "79bf0ab3-3986-4205-8529-5a730587cef1", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #2 - Immersion suits not inspected", "description": "During the onboard inspection, it was identified that the immersion suits had not been inspected and maintained in accordance with the requirements of SOLAS regulations. Regular inspection of immersion suits is essential to ensure that they remain in good condition, are free from defects, and are fully operational in the event of an emergency. The absence of proper inspection records or evidence of routine checks raises concerns regarding the readiness and reliability of this critical life-saving equipment, and indicates non-compliance with the applicable safety requirements.", "dateRaised": "2026-03-19", "deadline": "2026-04-02", "status": "Overdue", "correctiveAction": "The Master was instructed to arrange inspection of the immersion suits as soon as practically.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/808/frontpage-ism-audit-nc-2-immersion-suits-not-inspected?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "b02534e4-17d6-4a70-ac8d-68908dd037fb", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #1 - Expired certifikates", "description": "During the ISM/MLC audit conducted onboard, it was identified that several certificates contained within the vessel’s certificate file had expired and were no longer valid. Maintaining up-to-date statutory and class certificates is a fundamental requirement to ensure compliance with applicable regulations and to demonstrate the vessel’s continued fitness for operation. The presence of expired certificates indicates a deficiency in the vessel’s document control and monitoring procedures and may expose the vessel to regulatory non-compliance, potential detention, or operational restrictions.", "dateRaised": "2026-03-19", "deadline": "2026-03-19", "status": "Overdue", "correctiveAction": "Master instructed to replace certificates in the folder immidiately.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/807/frontpage-ism-audit-nc-1-expired-certifikates?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "b9f853aa-5d8a-4700-9595-fe2dea8ea122", "vessel": "Samson", "type": "NC", "title": "Gear PS", "description": "Propulsion Gear on Main Engine Portside sometimes gets too hot, and sometimes we can hear noise when we go from Zero to Dead Slow.", "dateRaised": "2026-03-18", "deadline": "2026-03-18", "status": "Overdue", "correctiveAction": "None", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a he crew has not got any salary in 3 months. This is absolutely not ok. These guys have families at home, and should have sent money to them long time ago. If we get a Port State Control we will be in deep shit.", "dateRaised": "2026-04-25", "deadline": "2026-05-05", "status": "Overdue", "correctiveAction": "CEO and DPA are informed about the situation.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/839/frontpage-not-compliant-with-mlc?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "99570218-aec3-43b2-9865-24a7ad5e2e2b", "vessel": "Herkules", "type": "OBS", "title": "Towing hook", "description": "Towing hook is not working as it should nor assembled as it should. It needs to be greased and tested more often so that we can be sure that it releases the towing line every time we push the button.", "dateRaised": "2026-04-23", "deadline": "2026-05-23", "status": "Overdue", "correctiveAction": "Hook is now cleansed, greased disassembled and assembled again and works fine. Only we need to make it easier to move to port and starboard.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/838/frontpage-towing-hook?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": ""}, {"id": "cef6a917-23c4-4590-a3b8-f0fc474212d7", "vessel": "Herkules", "type": "NC", "title": "Key for fire hose coupling", "description": "2 keys are missing, one in the fire hose box no. 1 and 1 in the fire hose box no. 3.", "dateRaised": "2026-04-22", "deadline": "2026-04-22", "status": "Overdue", "correctiveAction": "2 keys were found in the storeroom and placed in the fire hose boxes.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/837/frontpage-key-for-fire-hose-coupling?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "099b4156-12c8-41c2-b8d6-29e560ac1d70", "vessel": "Herkules", "type": "OBS", "title": "Sprinklers for windows on bridge", "description": "We get no water through sprinklers for windows on bridge.", "dateRaised": "2026-04-20", "deadline": "2026-05-20", "status": "Overdue", "correctiveAction": "Coils tested and found to be ok. Voltage for coils tested and found to be ok when we push the button. We continue searching.. We could find out that someone cut the pipe which lead to the bridge. We connected again and tested, and found out that one of the valve were leaking and the other one was not working like it should. Valves were dismantled and it seemed to be the diaphragm that was in bad condition. We have searched for diaphragm for this type of valve, but without luck.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/834/frontpage-sprinklers-for-windows-on-bridge?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": ""}, {"id": "9905e9aa-cbfe-4bfc-a874-90f95d78a332", "vessel": "Herkules", "type": "NC", "title": "Satellite and Magnetic Compass", "description": "The Satellite Compass does not always work properly. Some days OOW needs to use the tiller, because the Auto Pilot does not always get data from the Satellite Compass. When we on the Auto Pilot shift from Satellite Compass to Magnetic Compass, we get the warning CPS - LO - FAIL", "dateRaised": "2026-04-12", "deadline": "2026-05-12", "status": "Overdue", "correctiveAction": "Connection to instrument for Satelite Compass, and connection to Auto Pilot is tested and found to be ok. The fault seems to be that the Satellite Compass Antenna (disc) is placed too close to the mast. It is only placed 0,5 m from mast, and should at least be 1,5 meters away from a mast with this diameter. We also found out that the coil on the Magnetic Compass is not connected to the Autopilot, and as there is no instruction manual for the Autopilot, which is a Navitron NT921G, we have got info about wiring from Navitron in UK. We will try to find the cable from the Magnetic Compass and connect to the Autopilot. Cable found and magnetic coil connected to Autopilot, so now we can switch between Satellite Compass and Magnetic Compass. Antenna Plan can not be found onboard, so we have started to make an Antenna Plan.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/825/frontpage-satellite-and-magnetic-compass?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": ""}, {"id": "e7f05df0-2f21-4b36-9e67-c1aa1e75bfd5", "vessel": "Herkules", "type": "OBS", "title": "Gangway", "description": "A ladder is used as gangway, and there is no safety net (see attached picture)*", "dateRaised": "2026-04-11", "deadline": "2026-04-11", "status": "Overdue", "correctiveAction": "The only corrective action made concerning this is to place a plate on the ladder, and to tie a rope between the vessel and a bollard ashore (see attached pictures) Our suggestion is to buy a 5 to 6 meters long gangway + a safety net.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/824/frontpage-gangway?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "93302edb-8b80-43c8-8ddf-9278b41ab2d3", "vessel": "Herkules", "type": "OBS", "title": "Rescue Sling", "description": "The Rescue Sling, which is mounted outside, did not have any line connected to the sling.", "dateRaised": "2026-04-11", "deadline": "2026-04-11", "status": "Overdue", "correctiveAction": "We found a line in one of the store room and connected it to the sling. After this we held a MOB drill, where everyone was made familiar with the Rescue Sling. The locks for conneccting the rods together were losenet&greased. My opinion is that the Rescue Sling should not be mounted outside, but inside the ship, where the plastic parts on the sling would be protected by the sun, and the risk of loosing the Rescue Sling in bad weather was eliminated.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/823/frontpage-rescue-sling?start=0", "rootCause": "Lack of training", "managementComment": "", "finalManagementComment": ""}, {"id": "5657f296-c8ae-478c-a241-2f3dcf4fb9ec", "vessel": "Herkules", "type": "OBS", "title": "Emergency Hatch covered with plastic", "description": "Emergency Hatch was covered with plastic which was tied with a rope. This was done because the hatch was not water tight.", "dateRaised": "2026-04-11", "deadline": "2026-04-11", "status": "Overdue", "correctiveAction": "Plastic and rope were removed, and new gasket ordered from agent. Today the old gasket was replaced with a new gasket. This is also done on the Emergency Hatch for engine room", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/822/frontpage-emergency-hatch-covered-with-plastic?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "783148cd-b0da-4730-b0dd-1fbaeb2e492e", "vessel": "Herkules", "type": "NC", "title": "NC001", "description": "", "dateRaised": "2026-01-14", "deadline": "2026-01-13", "status": "Closed", "correctiveAction": "Medical chest certificate renewed.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/784/frontpage-nc001?start=0", "rootCause": "", "managementComment": "", "finalManagementComment": ""}, {"id": "853f3f11-b9df-476a-aa33-d76926c80c80", "vessel": "Herkules", "type": "NC", "title": "Crew wor ription": "", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "status": "Closed", "correctiveAction": "Crew was instructed that such actions cannot be performed in any case. All fire detectors must be free from cover.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/767/frontpage-psc-03?start=0", "rootCause": "", "managementComment": "", "finalManagementComment": ""}, {"id": "36885339-8921-449d-891a-df894655f94d", "vessel": "Herkules", "type": "NC", "title": "PSC-02", "description": "", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "status": "Closed", "correctiveAction": "IMO sign was requested and ordered by Master, will be delivered in Stavanger.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/766/frontpage-psc-02?start=0", "rootCause": "", "managementComment": "", "finalManagementComment": ""}, {"id": "06dadf25-4203-4e58-863a-b69493f88477", "vessel": "Herkules", "type": "NC", "title": "PSC-01", "description": "", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "status": "Closed", "correctiveAction": "Approved.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/765/frontpage-psc-01?start=0", "rootCause": "", "managementComment": "", "finalManagementComment": ""}, {"id": "05389a48-abb3-490c-b8f8-65483c691bb9", "vessel": "Argus", "type": "NC", "title": "Loss of Access to MARAD (PMS)", "description": "The MARAD Planned Maintenance System (PMS) is currently non-functional on board. The issue has been reported to the DPA, and according to the feedback received, the matter is currently being escalated to the Ship Owner for resolution. As of now, the system remains inaccessible, preventing the technical department from managing maintenance schedules, reporting completed tasks, and monitoring safety-critical equipment intervals.", "dateRaised": "2026-04-21", "deadline": "2026-05-05", "status": "Overdue", "correctiveAction": "1. To ensure compliance with safety regulations, all mandatory inspections and maintenance tasks (including Safety, Fire-Fighting, and Life-Saving equipment) are being recorded manually in the Deck Log Book and Engine Room Log Book. 2. Critical equipment running hours are tracked via engine room logs to prevent overdue maintenance. 3. Constant communication is maintained with the DPA regarding the status of the system restoration.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/836/frontpage-loss-of-access-to-marad-pms?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "We constantly reminding owenr to reinstate the MARAD and pay overdues. NC will be closed when MARAD lisense will be renewed."}, {"id": "8e25ecdb-f2c9-4b51-bc55-ed8f9b352268", "vessel": "Argus", "type": "NC", "title": "Discrepancies in Garbage Management Plan (GMP)", "description": "During an internal audit of the vessel's Garbage Management Plan (GMP) and actual garbage collection stations, several significant non-conformities were identified: 1.\tIncorrect Location of Main Garbage Station: The current GMP states that garbage receptacles for Plastic, Food, Domestic, and Operational waste are located on the Main Deck, Port Side. However, the actual physical location is on the Poop Deck Level, Starboard Side (Working boat Platform). 2.\tDiscrepancy in Receptacle Capacities: Actual internal measurements of the containers differ significantly from the volumes stated in the GMP: * Deck Operational Waste (Category F): Actual usable volume is 0.60 m³ (instead of 50L). * Engine Room Bin (Category F): Actual usable volume is 0.07 m³ (instead of 50L). 3.\tInconsistent Color Coding: Category F (Operational Waste) containers have different marking colors in the Engine Room and on Deck, which contradicts the requirement for a unified marking system as per the GMP. 4.\tInapplicable Waste Categories: Category J (Cargo Residues) is currently listed in the inventory but is not applicable to this vessel's type and trade.", "dateRaised": "2026-04-21", "deadline": "2026-05-21", "status": "Overdue", "correctiveAction": "1. Conducted an internal audit and physical measurements of all garbage receptacles to establish actual usable volumes. 2. Created a 'Marked-up' working copy of the Garbage Management Plan (GMP) with corrected locations and capacities. 3. This corrected page has been printed and inserted into the onboard GMP folder to ensure accurate record-keeping in the Garbage Record Book until an official revision is received from the Company. 4. Briefed the crew/engine department on the corrected capacities for accurate entries.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/835/frontpage-discrepancies-in-garbage-management-plan-gmp?start=0", "rootCause": "Antiquated procedure", "managementComment": "", "finalManagementComment": "Revision will be made"}, {"id": "ed0997e5-63e1-4a8f-9d00-d66fba059a95", "vessel": "Argus", "type": "OBS", "title": "REC 26-02 Cleanliness in ER can be improved.", "description": "", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/795/frontpage-rec-26-02-cleanliness-in-er-can-be-improved?start=0", "rootCause": "", "managementComment": "", "finalManagementComment": ""}, {"id": "9e2cb200-3734-4319-9fd0-8e86b9c5ad1a", "vessel": "Argus", "type": "OBS", "title": "REC 26-01 Medicine in hospital not sorted out", "description": "", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/i let findings = [], editingId = null;
let filterOverdueAllTime = false, filterExcludeClosed = false, drillFrom = '', drillTo = '';
function resetDrillMode() { filterOverdueAllTime = false; filterExcludeClosed = false; drillFrom = ''; drillTo = ''; }

function load() {
  try {
    findings = JSON.parse(JSON.stringify(SEED));
  } catch(e) { findings = JSON.parse(JSON.stringify(SEED)); }
  refreshOverdue();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(findings)); }
function refreshOverdue() {
  const today = new Date().toISOString().slice(0,10);
  findings.forEach(function(f) {
    if (f.status === 'Open' && f.deadline && f.deadline < today) f.status = 'Overdue';
    if (f.status === 'Overdue' && (!f.deadline || f.deadline >= today)) f.status = 'Open';
  });
}

function showSection(id, tab, pushState) {
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  tab.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'findings') renderTable();
  if (pushState !== false) {
    history.pushState({section: id}, '', '#' + id);
  }
}

function populateVesselSelects() {
  ['fVessel','filterVessel'].forEach(function(id) {
    var el = document.getElementById(id);
    while (el.options.length > 1) el.remove(1);
    VESSELS.forEach(function(v) { var o = document.createElement('option'); o.value = o.textContent = v; el.appendChild(o); });
  });
}

function setPreset(btn, months) {
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var today = new Date();
  document.getElementById('dashTo').value = today.toISOString().slice(0,10);
  if (months === 0) {
    document.getElementById('dashFrom').value = '';
  } else {
    var from = new Date(today);
    from.setMonth(from.getMonth() - months);
    document.getElementById('dashFrom').value = from.toISOString().slice(0,10);
  }
  renderDashboard();
}
function onDateChange() {
  document.querySelectorAll('.preset-btn').forEach(function(b){b.classList.remove('active');});
  renderDashboard();
}
function getFiltered() {
  var from = document.getElementById('dashFrom').value;
  var to   = document.getElementById('dashTo').value;
  return findings.filter(function(f) {
    if (from && f.dateRaised && f.dateRaised < from) return false;
    if (to   && f.dateRaised && f.dateRaised > to)   return false;
    return true;
  });
}

function renderDashboard() {
  var df = getFiltered();
  document.getElementById('dashCount').textContent = df.length + ' finding' + (df.length !== 1 ? 's' : '') + ' in range';
  renderSummaryBar(df);
  renderVesselCards(df);
}

function sCard(lbl, num, color, sub, filterType, filterStatus) {
  var onclick = '';
  if (filterType)   onclick = 'drillDown(\'\',\''+filterType+'\',\'\')';
  if (filterStatus) onclick = 'drillDown(\'\',\'\',\''+filterStatus+'\')';
  if (lbl==='Total findings') onclick = 'drillDown(\'\',\'\',\'\')';
  return '<div class="summary-card" style="border-top-color:' + color + '" onclick="' + onclick + '">' +
    '<div class="s-num" style="color:' + color + '">' + num + '</div>' +
    '<div class="s-lbl">' + lbl + '</div>' +
    '<div class="s-sub">' + sub + '</div></div>';
}

function rowClick(e, id) {
  if (e.target.closest('button')) return;
  openDetail(id);
}

function drillDownVessel(vessel) {
  drillDown(vessel, '', '');
}

function drillDownVesselType(vessel, type) {
  var from = document.getElementById('dashFrom').value;
  var to   = document.getElementById('dashTo').value;
  filterOverdueAllTime = true;
  filterExcludeClosed = true;
  drillFrom = from;
  drillTo = to;
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}

function drillDownOverdue(vessel, type) {
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = 'Overdue';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}
function drillDown(vessel, type, status) {
  document.getElementById('filterVessel').value = vessel || '';
  document.getElementById('filterType').value   = type   || '';
  document.getElementById('filterStatus').value = status || '';
  document.getElementById('filterSearch').value = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  var tab = document.querySelector('.nav-tab:nth-child(2)');
  showSection('findings', tab, true);
}

function renderSummaryBar(df) {
  var total   = findings.length;
  var nc      = df.filter(function(f){return f.type==='NC';}).length;
  var nm      = df.filter(function(f){return f.type==='NM';}).length;
  var obs     = df.filter(function(f){return f.type==='OBS';}).length;
  var open    = df.filter(function(f){return f.status==='Open';}).length;
  var overdue = findings.filter(function(f){return f.status==='Overdue';}).length;
  document.getElementById('summaryBar').innerHTML =
    sCard('Total findings',   total,   '#1a3a5c', 'all time',  '',    ''       ) +
    sCard('Non-conformities', nc,      '#9b5555', 'in period', 'NC',  ''       ) +
    sCard('Near misses',      nm,      '#9b7a35', 'in period', 'NM',  ''       ) +
    sCard('Observations',     obs,     '#1a5ea8', 'in period', 'OBS', ''       ) +
    sCard('Open',             open,    '#a03030', 'in period', '',    'Open'   ) +
    '<div class="summary-card" style="border-top-color:#60408a" onclick="drillDownOverdue(\'\',\'\')"><div class="s-num" style="color:#60408a">' + overdue + '</div><div class="s-lbl">Overdue</div><div class="s-sub">fleet-wide</div></div>';
}

function renderVesselCards(df) {
  var grid = document.getElementById('vesselGrid');
  grid.innerHTML = '';
  VESSELS.forEach(function(vessel) {
    var vf = df.filter(function(f){return f.vessel===vessel;});
    var total = vf.length;
    var rows = ['NC','NM','OBS'].map(function(type) {
      var tf = vf.filter(function(f){return f.type===type;});
      var raised  = tf.length;
      var closed  = tf.filter(function(f){return f.status==='Closed';}).length;
      var overdue = findings.filter(function(f){return f.vessel===vessel && f.type===type && f.status==='Overdue';}).length;
      return '<div class="type-row" style="cursor:pointer;" onclick="drillDownVesselType(\''+vessel+'\',\''+type+'\')" title="View ' + type + ' for ' + vessel + '">' +
        '<span class="type-label type-' + type.toLowerCase() + '">' + type + '</span>' +
        '<div class="stat-box stat-raised"><div class="stat-num">' + raised + '</div><div class="stat-lbl">Raised</div></div>' +
        '<div class="stat-box stat-closed"><div class="stat-num">' + closed + '</div><div class="stat-lbl">Closed</div></div>' +
        '<div class="stat-box stat-overdue"><div class="stat-num">' + overdue + '</div><div class="stat-lbl">Overdue</div></div>' +
        '</div>';
    }).join('');
    grid.innerHTML +=
      '<div class="vessel-card">' +
        '<div class="vessel-card-header" onclick="drillDownVessel(\''+vessel+'\')" title="Click to view all findings for this vessel"><h3>' + vessel + '</h3><span class="vessel-badge">' + total + ' finding' + (total!==1?'s':'') + ' &rsaquo;</span></div>' +
        '<div class="vessel-card-body">' +
          '<div style="display:grid;grid-template-columns:100px 1fr 1fr 1fr;gap:8px;padding:0 0 8px;border-bottom:0.5px solid #eef2f7;margin-bottom:4px;">' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;">TYPE</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">RAISED</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">CLOSED</span>' +
            '<span style="font-size:.7rem;color:var(--muted);font-weight:600;text-align:center;">OVERDUE</span>' +
          '</div>' + rows +
        '</div></div>';
  });
}

function renderTable() {
  var vessel = document.getElementById('filterVessel').value;
  var type   = document.getElementById('filterType').value;
  var status = document.getElementById('filterStatus').value;
  var search = document.getElementById('filterSearch').value.toLowerCase();
  var order  = {Overdue:0,Open:1,Closed:2};
  var dateFrom = document.getElementById('filterFrom').value;
  var dateTo   = document.getElementById('filterTo').value;
  var filtered = findings.filter(function(f) {
    if (vessel   && f.vessel !== vessel) return false;
    if (type     && f.type   !== type)   return false;
    if (status   && f.status !== status) return false;
    if (filterExcludeClosed && f.status === 'Closed') return false;
    if (filterOverdueAllTime && f.status === 'Overdue') {
      // Overdue bypasses date filter — show all-time
    } else {
      var ef = filterOverdueAllTime ? drillFrom : dateFrom;
      var et = filterOverdueAllTime ? drillTo   : dateTo;
      if (ef && f.dateRaised && f.dateRaised < ef) return false;
      if (et && f.dateRaised && f.dateRaised > et) return false;
    }
    if (search && !f.description.toLowerCase().includes(search) && !f.vessel.toLowerCase().includes(search)) return false;
    return true;
  }).sort(function(a,b) {
    var od = (order[a.status]||0) - (order[b.status]||0);
    return od !== 0 ? od : (b.dateRaised||'').localeCompare(a.dateRaised||'');
  });
  var tbody = document.getElementById('findingsBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><p>No findings match your filters.</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(f, i) {
    return '<tr data-id="' + f.id + '" onclick="rowClick(event,this.dataset.id)" style="cursor:pointer;" >' +
      '<td style="color:var(--muted);font-size:.8rem;">' + (i+1) + '</td>' +
      '<td style="font-weight:600;">' + esc(f.vessel) + '</td>' +
      '<td><span class="badge badge-' + f.type.toLowerCase() + '">' + f.type + '</span></td>' +
      '<td><div style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(f.description) + '">' + esc(f.description) + '</div></td>' +
      '<td style="white-space:nowrap;">' + fmtDate(f.dateRaised) + '</td>' +
      '<td style="white-space:nowrap;">' + (f.deadline ? fmtDate(f.deadline) : '&#8212;') + '</td>' +
      '<td style="white-space:nowrap;">' + (f.dateClosed  ? fmtDate(f.dateClosed)  : '&#8212;') + '</td>' +
      '<td><span class="badge badge-' + f.status.toLowerCase() + '">' + f.status + '</span></td>' +
      '<td style="white-space:nowrap;" onclick="event.stopPropagation()">' +
        '<button class="btn-action" data-id="' + f.id + '" onclick="openEditModal(this.dataset.id)">Edit</button>' +
      '</td></tr>';
  }).join('');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Finding';
  ['fVessel','fType','fDesc','fTargetClose','fRootCause','fCorrectiveAction','fDateClosed'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('fDateRaised').value = new Date().toISOString().slice(0,10);
  document.getElementById('fStatus').value = 'Open';
  document.getElementById('addModal').classList.add('open');
}
function openEditModal(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Finding';
  document.getElementById('fVessel').value = f.vessel;
  document.getElementById('fType').value   = f.type;
  document.getElementById('fDesc').value   = f.description;
  document.getElementById('fDateRaised').value  = f.dateRaised  || '';
  document.getElementById('fTargetClose').value = f.deadline || '';
  document.getElementById('fRootCause').value   = f.rootCause   || '';
  document.getElementById('fCorrectiveAction').value = f.correctiveAction || '';
  document.getElementById('fStatus').value    = f.status==='Overdue' ? 'Open' : f.status;
  document.getElementById('fDateClosed').value = f.dateClosed || '';
  closeModal('detailModal');
  document.getElementById('addModal').classList.add('open');
}
function saveFinding() {
  var vessel   = document.getElementById('fVessel').value.trim();
  var type     = document.getElementById('fType').value;
  var desc     = document.getElementById('fDesc').value.trim();
  var dateRaised = document.getElementById('fDateRaised').value;
  if (!vessel||!type||!desc||!dateRaised) { alert('Please fill in all required fields.'); return; }
  var status      = document.getElementById('fStatus').value;
  var targetClose = document.getElementById('fTargetClose').value;
  var today = new Date().toISOString().slice(0,10);
  var finalStatus = (status==='Open' && targetClose && targetClose<today) ? 'Overdue' : status;
  var record = { vessel:vessel, type:type, description:desc, dateRaised:dateRaised,
    deadline:targetClose, rootCause:document.getElementById('fRootCause').value.trim(),
    correctiveAction:document.getElementById('fCorrectiveAction').value.trim(),
    status:finalStatus, dateClosed:status==='Closed'?document.getElementById('fDateClosed').value:'' };
  if (editingId) {
    var idx = findings.findIndex(function(f){return f.id===editingId;});
    if (idx>-1) findings[idx] = Object.assign(findings[idx], record);
  } else {
    record.id = 'f_' + Date.now();
    record.createdAt = new Date().toISOString();
    findings.push(record);
  }
  save(); closeModal('addModal'); renderDashboard(); renderTable();
}
function openDetail(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  var typeNames = {NC:'Non-Conformity',NM:'Near Miss',OBS:'Observation'};
  document.getElementById('detailBody').innerHTML =
    '<div style="display:flex;gap:10px;margin-bottom:18px;">' +
      '<span class="badge badge-' + f.type.toLowerCase() + '">' + (typeNames[f.type]||f.type) + '</span>' +
      '<span class="badge badge-' + f.status.toLowerCase() + '">' + f.status + '</span>' +
    '</div>' +
    '<div class="detail-row"><span class="detail-label">Vessel</span><span>' + esc(f.vessel) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Description</span><span>' + (f.description ? esc(f.description) : '—') + '</span></div>' +
    '<hr class="detail-divider">' +
    '<div class="detail-row"><span class="detail-label">Date Raised</span><span>' + fmtDate(f.dateRaised) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Target Date Close</span><span>' + (f.deadline ? fmtDate(f.deadline) : '—') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Date Closed</span><span>' + (f.dateClosed ? fmtDate(f.dateClosed) : '—') + '</span></div>' +
    '<hr class="detail-divider">' +
    '<div class="detail-row"><span class="detail-label">Root Cause</span><span>' + (f.rootCause ? esc(f.rootCause) : '—') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Corrective Action</span><span>' + (f.correctiveAction ? esc(f.correctiveAction) : '—') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Comment from Management</span><span>' + (f.managementComment ? esc(f.managementComment) : '—') + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Final Comment from Management</span><span>' + (f.finalManagementComment ? esc(f.finalManagementComment) : '—') + '</span></div>';
  var footer =
    '<button class="btn-outline" onclick="closeModal(this.dataset.m)" data-m="detailModal">Close</button>' +
    '<button class="btn-action" style="padding:8px 18px;" data-id="' + f.id + '" onclick="openEditModal(this.dataset.id)">Edit</button>';
  if (f.status !== 'Closed') footer += '<button class="btn btn-primary" data-id="' + f.id + '" onclick="closeOutFinding(this.dataset.id)">Mark as Closed</button>';
  footer += '<button class="btn btn-danger" data-id="' + f.id + '" onclick="deleteFinding(this.dataset.id)">Delete</button>';
  document.getElementById('detailFooter').innerHTML = footer;
  document.getElementById('detailModal').classList.add('open');
}
function closeOutFinding(id) {
  var f = findings.find(function(x){return x.id===id;}); if(!f) return;
  if (!confirm('Mark this finding as Closed?')) return;
  f.status = 'Closed'; f.dateClosed = new Date().toISOString().slice(0,10);
  save(); closeModal('detailModal'); renderDashboard(); renderTable();
}
function deleteFinding(id) {
  if (!confirm('Delete this finding? This cannot be undone.')) return;
  findings = findings.filter(function(x){return x.id!==id;});
  save(); closeModal('detailModal'); renderDashboard(); renderTable();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===o) o.classList.remove('open'); });
});
function fmtDate(d) {
  if(!d) return '&#8212;';
  var p = d.split('-');
  var m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(p[2]) + ' ' + m[parseInt(p[1])-1] + ' ' + p[0];
}
function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// HISTORY — back/forward button support
window.addEventListener('popstate', function(e) {
  var id = (e.state && e.state.section) ? e.state.section : 'dashboard';
  var tab = document.querySelector('.nav-tab:nth-child(' + (id === 'findings' ? '2' : '1') + ')');
  showSection(id, tab, false);
});
