<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shipping.fo - Deviation Management</title>
<style>
:root{--primary:#1a3a5c;--site-blue:#1a5ea8;--bg:#f3f6fb;--card:#fff;--border:#dce5f0;--text:#1c2833;--muted:#7a90a8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
header{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
header h1{font-size:1.1rem;font-weight:600;display:flex;align-items:center;gap:10px;color:#1a3a5c;}
.btn{padding:8px 18px;border-radius:6px;border:none;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:#1a5ea8;color:#fff;}.btn-primary:hover{background:#164e8e;}
.btn-danger{background:#e74c3c;color:#fff;}.btn-danger:hover{background:#c0392b;}
.btn-sm{padding:5px 11px;font-size:.78rem;}
.btn-outline{background:none;border:0.5px solid var(--border);color:var(--text);padding:8px 18px;border-radius:6px;cursor:pointer;font-size:.875rem;font-weight:600;}
.btn-outline:hover{background:var(--bg);}
.btn-action{background:#eef3f9;color:#1a5ea8;border:0.5px solid #9ab8d8;padding:5px 11px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;}
.btn-action:hover{background:#ddeaf7;}
nav{display:flex;background:#fff;padding:0 32px;border-bottom:1px solid var(--border);}
.nav-tab{padding:12px 22px;color:#7a90a8;cursor:pointer;font-size:.875rem;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;user-select:none;}
.nav-tab:hover{color:#1a5ea8;}.nav-tab.active{color:#1a5ea8;border-bottom-color:#1a5ea8;font-weight:600;}
main{padding:28px 32px;}
.section{display:none;}.section.active{display:block;}
.dash-filter{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.dash-filter label{font-size:.82rem;font-weight:600;color:var(--muted);}
.preset-btn{padding:5px 12px;border-radius:5px;border:0.5px solid var(--border);background:#fff;color:#4a6280;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;}
.preset-btn:hover{background:#eef3f9;border-color:#9ab8d8;color:#1a5ea8;}
.preset-btn.active{background:#1a5ea8;border-color:#1a5ea8;color:#fff;}
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:24px;}
.summary-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;border-top:3px solid #ccc;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer;transition:box-shadow .15s,transform .15s;}.summary-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-2px);}
.s-num{font-size:1.9rem;font-weight:700;line-height:1;}
.s-lbl{font-size:.8rem;font-weight:600;color:#3a5070;margin-top:4px;}
.s-sub{font-size:.7rem;color:var(--muted);margin-top:2px;}
.vessel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;}
.vessel-card{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.vessel-card-header{background:var(--primary);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s;}.vessel-card-header:hover{background:#254f7a;}
.vessel-card-header h3{font-size:1rem;font-weight:600;}
.vessel-badge{background:rgba(255,255,255,0.18);border-radius:20px;padding:3px 10px;font-size:.78rem;}
.vessel-card-body{padding:14px 16px;}
.type-row{display:grid;grid-template-columns:100px 1fr 1fr 1fr;align-items:center;padding:7px 0;border-bottom:0.5px solid #eef2f7;gap:8px;}
.type-row:last-child{border-bottom:none;}
.type-label{font-size:.72rem;font-weight:600;letter-spacing:.6px;padding:3px 8px;border-radius:3px;text-align:center;text-transform:uppercase;background:#f0f4f8;color:#4a6280;border-left:2px solid #9ab0c8;}
.type-nc{border-left-color:#9b5555;color:#7a3030;}.type-nm{border-left-color:#9b7a35;color:#7a5a1a;}.type-obs{border-left-color:#3a6fa8;color:#1a4a7a;}
.stat-box{text-align:center;background:#f8fafc;border-radius:5px;padding:5px 4px;}
.stat-num{font-size:1.2rem;font-weight:700;line-height:1;}
.stat-lbl{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.stat-raised .stat-num{color:#e74c3c;}.stat-closed .stat-num{color:#27ae60;}.stat-overdue .stat-num{color:#8e44ad;}
.filters{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.filters label{font-size:.82rem;font-weight:600;color:var(--muted);}
select,input[type="text"],input[type="date"],textarea{border:0.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.875rem;color:var(--text);background:#fff;outline:none;transition:border-color .15s;font-family:inherit;}
select:focus,input:focus,textarea:focus{border-color:#1a5ea8;box-shadow:0 0 0 2px rgba(26,94,168,.1);}
.table-wrap{background:#fff;border:0.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
table{width:100%;border-collapse:collapse;font-size:.875rem;}
thead{background:var(--primary);color:#fff;}
thead th{padding:12px 14px;text-align:left;font-weight:600;font-size:.78rem;letter-spacing:.4px;white-space:nowrap;}
tbody tr{border-bottom:0.5px solid #eef2f7;transition:background .12s;}
tbody tr:hover{background:#f5f8fc;}
tbody tr:last-child{border-bottom:none;}
td{padding:11px 14px;vertical-align:middle;}
.badge{display:inline-block;padding:3px 9px;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.3px;}
.badge-nc{background:#f5efef;color:#7a3030;border:0.5px solid #d0a0a0;}
.badge-nm{background:#f5f0e8;color:#7a5a1a;border:0.5px solid #d0b878;}
.badge-obs{background:#eef3f9;color:#1a4a7a;border:0.5px solid #9ab8d8;}
.badge-open{background:#f9eded;color:#a03030;border:0.5px solid #d8a8a8;}
.badge-closed{background:#eaf5ef;color:#276040;border:0.5px solid #90c8a8;}
.badge-overdue{background:#f2edf8;color:#60408a;border:0.5px solid #b898d8;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);}
.modal-header{background:var(--primary);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:12px 12px 0 0;}
.modal-header h2{font-size:1.05rem;font-weight:600;}
.modal-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.8;line-height:1;}
.modal-close:hover{opacity:1;}
.modal-body{padding:24px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.82rem;font-weight:600;color:var(--primary);}
.form-group select,.form-group input,.form-group textarea{width:100%;}
textarea{resize:vertical;min-height:72px;}
.modal-footer{padding:16px 24px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.detail-row{display:flex;gap:8px;margin-bottom:12px;font-size:.9rem;}
.detail-label{font-weight:600;color:var(--primary);min-width:150px;flex-shrink:0;}
hr.detail-divider{border:none;border-top:0.5px solid var(--border);margin:14px 0;}
@media(max-width:700px){main{padding:16px;}.vessel-grid{grid-template-columns:1fr;}.summary-bar{grid-template-columns:repeat(2,1fr);}.form-grid{grid-template-columns:1fr;}header,nav{padding:0 16px;}}
</style>
</head>
<body>
<header>
  <h1 onclick="showSection('dashboard',document.querySelector('.nav-tab'))" style="cursor:pointer;" title="Go to Dashboard">
    <img src="https://shipping.fo/Content/images/logo.svg" style="height:38px;width:auto;" onerror="this.style.display='none'">
    Shipping.fo &ndash; Deviation Management
  </h1>
  <button class="btn btn-primary" onclick="openAddModal()">+ Add Finding</button>
</header>
<nav>
  <div class="nav-tab active" onclick="showSection('dashboard',this)">Dashboard</div>
  <div class="nav-tab" onclick="showSection('findings',this)">All Findings</div>
</nav>
<main>
  <section id="dashboard" class="section active">
    <div class="dash-filter">
      <label>Date range</label>
      <input type="date" id="dashFrom" onchange="onDateChange()">
      <span style="color:var(--muted);font-size:.85rem;">to</span>
      <input type="date" id="dashTo" onchange="onDateChange()">
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="preset-btn active" onclick="setPreset(this,1)">1 month</button>
        <button class="preset-btn" onclick="setPreset(this,3)">3 months</button>
        <button class="preset-btn" onclick="setPreset(this,6)">6 months</button>
        <button class="preset-btn" onclick="setPreset(this,12)">1 year</button>
        <button class="preset-btn" onclick="setPreset(this,0)">All time</button>
      </div>
      <span id="dashCount" style="margin-left:auto;font-size:.8rem;color:var(--muted);"></span>
    </div>
    <div class="summary-bar" id="summaryBar"></div>
    <div class="vessel-grid" id="vesselGrid"></div>
  </section>
  <section id="findings" class="section">
    <div style="padding:12px 0 4px 0;">
      <button class="btn-outline" onclick="showSection('dashboard',document.querySelector('.nav-tab'))" style="display:inline-flex;align-items:center;gap:6px;font-size:.85rem;">&#8592; Dashboard</button>
    </div>
    <div class="filters">
      <label>Vessel</label>
      <select id="filterVessel" onchange="renderTable()"><option value="">All Vessels</option></select>
      <label>Type</label>
      <select id="filterType" onchange="renderTable()">
        <option value="">All Types</option>
        <option value="NC">Non-Conformity</option>
        <option value="NM">Near Miss</option>
        <option value="OBS">Observation</option>
      </select>
      <label>Status</label>
      <select id="filterStatus" onchange="renderTable()">
        <option value="">All Statuses</option>
        <option value="Open">Open</option>
        <option value="Closed">Closed</option>
        <option value="Overdue">Overdue</option>
      </select>
      <label>From</label>
      <input type="date" id="filterFrom" onchange="clearTablePresets();resetDrillMode();renderTable()">
      <label>To</label>
      <input type="date" id="filterTo" onchange="clearTablePresets();resetDrillMode();renderTable()">
      <input type="text" id="filterSearch" placeholder="Search..." oninput="renderTable()" style="min-width:180px;">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:4px;">
        <button class="preset-btn table-preset-btn active" onclick="setTablePreset(this,1)">1 month</button>
        <button class="preset-btn table-preset-btn" onclick="setTablePreset(this,3)">3 months</button>
        <button class="preset-btn table-preset-btn" onclick="setTablePreset(this,6)">6 months</button>
        <button class="preset-btn table-preset-btn" onclick="setTablePreset(this,12)">1 year</button>
        <button class="preset-btn table-preset-btn" onclick="setTablePreset(this,0)">All time</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Vessel</th><th>Type</th><th>Description</th><th>Date Raised</th><th>Target Close</th><th>Date Closed</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="findingsBody"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header"><h2 id="modalTitle">Add New Finding</h2><button class="modal-close" onclick="closeModal('addModal')">&#215;</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Vessel *</label><select id="fVessel"><option value="">Select vessel...</option></select></div>
        <div class="form-group"><label>Type *</label>
          <select id="fType">
            <option value="">Select type...</option>
            <option value="NC">Non-Conformity (NC)</option>
            <option value="NM">Near Miss (NM)</option>
            <option value="OBS">Observation (OBS)</option>
          </select>
        </div>
        <div class="form-group full"><label>Description *</label><textarea id="fDesc" placeholder="Describe the finding..."></textarea></div>
        <div class="form-group"><label>Date Raised *</label><input type="date" id="fDateRaised"></div>
        <div class="form-group"><label>Target Close Date</label><input type="date" id="fTargetClose"></div>
        <div class="form-group full"><label>Root Cause</label><textarea id="fRootCause" placeholder="Root cause analysis..."></textarea></div>
        <div class="form-group full"><label>Corrective Action</label><textarea id="fCorrectiveAction" placeholder="Corrective / preventive action..."></textarea></div>
        <div class="form-group"><label>Status</label><select id="fStatus"><option value="Open">Open</option><option value="Closed">Closed</option></select></div>
        <div class="form-group"><label>Date Closed</label><input type="date" id="fDateClosed"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveFinding()">Save Finding</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h2>Finding Details</h2><button class="modal-close" onclick="closeModal('detailModal')">&#215;</button></div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<script>
const VESSELS = ['Billefjord','Samson','Herkules','Argus','Grettir Sterki','Selvik Ice'];
const STORAGE_KEY = 'ism_v8';
const SEED = [{"id": "99f3fd73-7b08-458b-8d08-c7e02c946f22", "vessel": "Billefjord", "type": "NC", "title": "Explosion proof Portable VHF Radio", "description": "During monthly inspection C/O found the Portable radio low battery and he tried to charge but not charging at all. He suspected that the battery is not working", "dateRaised": "2026-06-02", "deadline": "2026-06-09", "dateClosed": "", "status": "Closed", "correctiveAction": "C/O informed the Captain about what happened to the radio, I called the tromso Supplier to inform about the Portable radio that he supplied onboard, and advised me to bring the Unit to there office for replacement, but it takes 1 week.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/848/frontpage-explosion-proof-portable-vhf-radio?start=0", "rootCause": "Outside our influence", "managementComment": "Corrective actions accepted, Case will be clsoed when unit replaced.", "finalManagementComment": ""}, {"id": "8424f9ee-b111-4d0d-bdb4-16ea9115c69c", "vessel": "Billefjord", "type": "NC", "title": "Toilet in Passenger accommodation", "description": "The door lock of passenger women toilet not able to lock properly", "dateRaised": "2026-05-21", "deadline": "2026-05-21", "dateClosed": "", "status": "Closed", "correctiveAction": "Informed cengr. to check the door lock and if possible to replace a new one,", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/845/frontpage-toilet-in-passenger-accommodation?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": ""}, {"id": "6872c1a1-b0e3-47de-8b06-dcc85b4f809a", "vessel": "Billefjord", "type": "NC", "title": "Toilet vaccum system", "description": "The toilet vaccum system keep running even not using,", "dateRaised": "2026-05-16", "deadline": "2026-05-16", "dateClosed": "", "status": "Closed", "correctiveAction": "Advised Cengr to check all toilet if there  is air leaking in the hose or pipings. after few minutes of searching the toilet in the cabin of deck boy and stewardess found broken hoseclip caused of air leaking cengr immediately look for new hose clip for replacement", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/841/frontpage-toilet-vaccum-system?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": ""}, {"id": "27fe2e26-86ec-4d98-a096-2aa3cc146985", "vessel": "Billefjord", "type": "NC", "title": "explosion proof portable radio", "description": "the issued portable radio for firemans outfit are not explosion proof and the Class surveyor required to have 2 unit onboard", "dateRaised": "2026-04-10", "deadline": "2026-04-17", "dateClosed": "", "status": "Closed", "correctiveAction": "informed the ship owner to purchase a new portable radio that marked with explosion proof and aproved by solas", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/821/frontpage-explosion-proof-portable-radio?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "09dbd0a0-845f-4283-b1d5-6f3b353c3ba4", "vessel": "Billefjord", "type": "NC", "title": "anti splash tape for auxilliary engine", "description": "During Rina class survey the inspector found out that the top of auxilliary engine in injector pipings not properly covered by anti splash tape,", "dateRaised": "2026-04-10", "deadline": "2026-04-10", "dateClosed": "", "status": "Closed", "correctiveAction": "Right away the engr. went to the store to purchase the said tape that approved by solas", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/820/frontpage-anti-splash-tape-for-auxilliary-engine?start=0", l": "Billefjord", "type": "NM", "title": "Entering cargo hold directly after opening the hatch", "description": "Entered cargo hold directly after opening the hatch and not letting out first the fumes for few minutes, and caused of dizziness, crew very often to go inside to pick up staff for passenger usage in our daily trip.", "dateRaised": "2019-08-29", "deadline": "2019-08-30", "dateClosed": "", "status": "Closed", "correctiveAction": "Conducted a briefing to all crew that if entering cargo hold should let the hatch open for few minutes to circulate the fresh air or oxygen inside the hold", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/191/frontpage-entering-cargo-hold-directly-after-opening-the-hatch?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Corrective actions accepted."}, {"id": "992184f9-bb2d-4a2f-85c7-ceb723935d6e", "vessel": "Billefjord", "type": "NM", "title": "Not wearing Hard hat during crane operation", "description": "During crane operation and lifting of rubber boat for passenger transfer, crew not wearing hard hat and almost hit of moving rubber boat while lifted.", "dateRaised": "2019-08-29", "deadline": "2019-08-30", "dateClosed": "", "status": "Closed", "correctiveAction": "advised them to wear hard hat during crane operation, and safety briefing to be included before the operation.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/190/frontpage-not-wearing-hard-hat-during-crane-operation?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Corrective actions accepted. Captain should hold a safety meeting as this is not first case regarding PPE using."}, {"id": "11b5c846-2146-4a55-810c-f272b2225bab", "vessel": "Billefjord", "type": "NM", "title": "Working in side of the boat while picking up  ice for the guest without life vest", "description": "Standing in the side of the boat while picking up ice without wearing life vest, it might be slipped or fall overboard", "dateRaised": "2019-08-29", "deadline": "2019-08-30", "dateClosed": "", "status": "Closed", "correctiveAction": "Advised the crew to wear life vest at all time while standing in the pontoon or side of the boat,", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/189/frontpage-working-in-side-of-the-boat-while-picking-up-ice-for-the-guest-without-life-vest?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "", "finalManagementComment": "Corrective actions accepted. The crew must be instructed accordingly"}, {"id": "0e0456e3-5ba5-4b79-b80a-994929c584b3", "vessel": "Billefjord", "type": "NM", "title": "Applying Rust remover with out safety goggles", "description": "during cleaning of the boat or doing wash paint i found out some crew not wearing safety goggle, it might be caused of blindness or eye irritation", "dateRaised": "2019-08-29", "deadline": "2019-08-30", "dateClosed": "", "status": "Closed", "correctiveAction": "Advised  all crew to wear a safety goggles to protect the eyes while dealing a chemical", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/188/frontpage-applying-rust-remover-with-out-safety-goggles?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "The crew should be instructed about wearing PPE while working with hazardous chemicals. Corrective actions accepted. Captain to instruct crew members, that this is not acceptible from crew members, to work without PPE when required."}, {"id": "82c53f89-0222-4229-89f7-e53bb98f2602", "vessel": "Billefjord", "type": "NM", "title": "obstruction at engine room stairs", "description": "a piece of metal plate obstructed the passageway of engine room stairs, and can be caused to collapse the person when in hurry or emergency situation.", "dateRaised": "2019-08-29", "deadline": "2019-08-30", "dateClosed": "", "status": "Closed", "correctiveAction": "advised c/e to cut the metal to give clear passage way", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/187/frontpage-obstruction-at-engine-room-stairs?start=0", "rootCause": "Lack of information", "managementComment": "", "finalManagementComment": "Corrective actions accepted. All emergency exit routes should be without any obstruction in the way."}, {"id": "a1a7b682-b48b-4920-a587-c2206fa7f244", "vessel": "Billefjord", "type": "NC", "title": "Toilet Vacuum Pump", "description": "Broken flap and not fitted anymore that caused air leakage", "dateRaised": "2019-08-27", "deadline": "2019-09-20", "dateClosed": "", "status": "Closed", "correctiveAction": "By replacing the new toilet vacuum flap spare parts", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/173/frontpage-toilet-vacuum-pump?start=0", "rootCause": "Choose:", "managementComment": "Corrective actions accepted, Master to inform when it will be evaluated.", "finalManagementComment": "Closed"}, {"id": "98522a11-efaa-40a5-9a78-b989bc27e126", "vessel": "Billefjord", "type": "NC", "title": "Small Leakage of Generator #1, Sea Water Pump", "description": "Deteriorated mechanical seal and broken internal parts", "dateRaised": "2019-08-27", "deadline": "2019-09-20", "dateClosed": "", "status": "Closed", "correctiveAction": "To pull out the pump and to be brought to a machine shop to fix and replace the internal broken parts", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/billefjord-report-a-notification/details/9/172/frontpage-small-leakage-of-generator-1,-sea-water-pump?start=0", "rootCause": "Choose:", "managementComment": "Corrective actions accepted, Master to inform when it will be done.", "finalManagementComment": "Closed by Master"}, {"id": "2011897b-f74f-4121-ab36-62a3f2cd2278", "vessel": "Samson", "type": "NM", "title": "Blackout", "description": "While pushing a vessel in Tórshavn Harbour, STB gen-set shuts down. The engineer could start up the gen-set so that the Samson could finish the job and get alongside. The fault seemed to be that a plug in the control box for the engine was not properly fastened.", "dateRaised": "2026-04-01", "deadline": "2026-04-01", "dateClosed": "", "status": "Closed", "correctiveAction": "The plug was fastened properly, and engineers informed.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/819/frontpage-blackout?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "2680e947-d8c8-407e-93f3-30fe88e83a3b", "vessel": "Samson", "type": "OBS", "title": "ISM Audit REC #1 - Training Manuals", "description": "t is recommended that SOLAS training manuals, covering both Life-Saving Appliances (LSA) and Fire Fighting (FF), be obtained and made available onboard. The provision of these manuals would support structured training and familiarization, thereby enhancing overall safety standards on board. This is particularly important given the high turnover of crew members, as consistent access to up-to-date training materials will help ensure that all personnel are adequately informed, properly trained, and capable of responding effectively in emergency situations.", "dateRaised": "2026-03-20", "deadline": "2026-04-20", "dateClosed": "", "status": "Closed", "correctiveAction": "Issue discussed with the Master.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/817/frontpage-ism-audit-rec-1-training-manuals?start=0", "rootCause": "Incomplete procedure", "managementComment": "", "finalManagementComment": ""}, {"id": "a9dec70f-ab75-4060-8342-a0167eb12a76", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #5 - Deck crane not inspedted", "description": "During the audit, it was noted that no valid certificate could be produced to confirm that the deck crane had undergone its required annual inspection. In accordance with applicable regulations and industry standards, deck cranes must be inspected and certified by an authorized and competent company at least once every 12 months. The absence of such documentation raises concerns regarding both regulatory compliance and the safe operation of the equipment, as regular inspections are essential to verify the crane’s structural integrity, operational reliability, and overall safety.", "dateRaised": "2026-03-20", "deadline": "2026-04-10", "dateClosed": "", "status": "Overdue", "correctiveAction": "The master instructed to arrange inspection of the deck crane as soon as possible.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/816/frontpage-ism-audit-nc-5-deck-crane-not-inspedted?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "ccd36a26-39a4-4031-996c-0abbbfbb5508", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #5 - Sterring Gear pumps", "description": "During the audit, it was identified that the hydraulic power unit for the steering gear is equipped with only a single hydraulic pump. This configuration presents a potential risk, as the failure of the sole pump could result in a loss of steering capability, thereby creating a hazardous situation for the vessel, particularly during critical operations such as maneuvering in confined waters or adverse conditions. It is therefore recommended that consideration be given to installing a second, independent hydraulic pump in order to provide redundancy. Such an arrangement would enhance the overall reliability of the steering system, improve operational safety, and ensure continued manoeuvrability in the event of equipment failure.", "dateRaised": "2026-03-20", "deadline": "2026-04-10", "dateClosed": "", "status": "Closed", "correctiveAction": "N/A", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/815/frontpage-ism-audit-obs-5-sterring-gear-pumps?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": ""}, {"id": "b1f2d09c-327e-436c-a8f1-7af751ca1e53", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #4 - No UKC specified", "description": "During the audit, it was identified that the required Under Keel Clearance (UKC) was neither defined in the Master’s Standing Orders nor addressed within the vessel’s procedures for passage planning. The absence of clearly specified UKC criteria may lead to inconsistencies in voyage planning and execution, and does not align with best practice for ensuring safe navigation, particularly in confined or shallow waters.", "dateRaised": "2026-03-20", "deadline": "2026-04-01", "dateClosed": "", "status": "Closed", "correctiveAction": "Master instructed to rectify", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/814/frontpage-ism-audit-obs-4-no-ukc-specified?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "", "finalManagementComment": ""}, {"id": "1953b83f-7657-4666-a4ab-c72495707723", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #3 - Standing Orders", "description": "During the audit, it was established that the Master’s Standing Orders had not been signed by all navigation officers, and that the Chief Engineer’s Standing Orders were not available onboard.", "dateRaised": "2026-03-19", "deadline": "2026-03-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Master instructed to rectify before departure.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/813/frontpage-ism-audit-obs-3-standing-orders?start=0", "rootCause": "Procedure(s) not effectively implemented", "managementComment": "", "finalManagementComment": ""}, {"id": "93835c41-0f39-4afe-b435-1d252b7c9304", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS # 2 - Risk Assessments.", "description": "During the audit, it was observed that only a limited number of risk assessments were available onboard. In accordance with the requirements of the International Safety Management (ISM) Code, risk assessments must be systematically conducted for all operations and tasks that may pose a potential hazard to the vessel, its crew, or the environment. The absence of sufficient documented risk assessments indicates that this requirement is not being fully implemented, and it raises concerns regarding the vessel’s ability to adequately identify, evaluate, and mitigate operational risks.", "dateRaised": "2026-03-19", "deadline": "2026-04-09", "dateClosed": "", "status": "Closed", "correctiveAction": "The Master is instructed to ensure that risk assessments are conducted in full compliance with the requirements of the applicable code.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/812/frontpage-ism-audit-obs-2-risk-assessments?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "25e443ef-39c3-43a3-956b-d371272297ef", "vessel": "Samson", "type": "OBS", "title": "ISM Audit OBS #1 - Nautical publicatios outdated.", "description": "During the audit, it was identified that the IAMSAR Manual onboard was the 2022 edition. Nautical publications are required to be maintained in their latest available editions, and therefore this does not meet the applicable requirements.", "dateRaised": "2026-03-19", "deadline": "2026-04-02", "dateClosed": "", "status": "Closed", "correctiveAction": "The Master instructed to replace IAMSAR as soon as possible.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/811/frontpage-ism-audit-obs-1-nautical-publicatios-outdated?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "60ac2765-5e6a-4384-8d6a-bdd93f442cbb", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #4 - Material Data SHeets", "description": "During the audit, a number of chemical substances were identified onboard; however, the corresponding Material Safety Data Sheets (MSDS) could not be produced upon request. This indicates that the vessel does not maintain adequate documentation for hazardous materials, as required, and raises concerns regarding the crew’s ability to access critical safety information related to handling, storage, and emergency response procedures for these substances.", "dateRaised": "2026-03-19", "deadline": "2026-04-08", "dateClosed": "", "status": "Overdue", "correctiveAction": "The Master was instructed to review and rationalize all chemicals onboard, ensuring that only approved substances are retained and that each is accompanied by the appropriate Material Safety Data Sheet (MSDS).", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/810/frontpage-ism-audit-nc-4-material-data-sheets?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "18a926e0-7f05-438f-bcc4-09a403569a38", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #3 - Emergency Drills", "description": "During the audit, it was determined that not all crew members had participated in emergency drills within the past month, meaning the vessel is not in compliance with SOLAS regulations. Engineers and Ordinary Seamen are engaged on a trip-by-trip basis rather than on a fixed schedule, resulting in the vessel departing port with approximately two-thirds of the crew having not taken part in a drill during the preceding month.", "dateRaised": "2026-03-19", "deadline": "2026-04-02", "dateClosed": "", "status": "Overdue", "correctiveAction": "The Master is instructed not to depart from port before all crewmembers has participated i an emergency drill.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/809/frontpage-ism-audit-nc-3-emergency-drills?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "b48de5ff-5efc-4853-8e38-84da91cb997e", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #2 - Immersion suits not inspected", "description": "During the onboard inspection, it was identified that the immersion suits had not been inspected and maintained in accordance with the requirements of SOLAS regulations. Regular inspection of immersion suits is essential to ensure that they remain in good condition, are free from defects, and are fully operational in the event of an emergency. The absence of proper inspection records or evidence of routine checks raises concerns regarding the readiness and reliability of this critical life-saving equipment, and indicates non-compliance with the applicable safety requirements.", "dateRaised": "2026-03-19", "deadline": "2026-04-02", "dateClosed": "", "status": "Overdue", "correctiveAction": "The Master was instructed to arrange inspection of the immersion suits as soon as practically.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/808/frontpage-ism-audit-nc-2-immersion-suits-not-inspected?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "23485f18-79d2-49cf-902b-f012c0c31d0f", "vessel": "Samson", "type": "NC", "title": "ISM Audit NC #1 - Expired certifikates", "description": "During the ISM/MLC audit conducted onboard, it was identified that several certificates contained within the vessel’s certificate file had expired and were no longer valid. Maintaining up-to-date statutory and class certificates is a fundamental requirement to ensure compliance with applicable regulations and to demonstrate the vessel’s continued fitness for operation. The presence of expired certificates indicates a deficiency in the vessel’s document control and monitoring procedures and may expose the vessel to regulatory non-compliance, potential detention, or operational restrictions.", "dateRaised": "2026-03-19", "deadline": "2026-03-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Master instructed to replace certificates in the folder immidiately.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/807/frontpage-ism-audit-nc-1-expired-certifikates?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "44232345-e5e6-43b2-a9c2-9bf431e546ba", "vessel": "Samson", "type": "NC", "title": "Gear PS", "description": "Propulsion Gear on Main Engine Portside sometimes gets too hot, and sometimes we can hear noise when we go from Zero to Dead Slow.", "dateRaised": "2026-03-18", "deadline": "2026-03-18", "dateClosed": "", "status": "Overdue", "correctiveAction": "None", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/806/frontpage-gear-ps?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "649ad7c1-fced-4072-9ef8-12320a00a75d", "vessel": "Samson", "type": "OBS", "title": "Internal Audit leak on the oil pan on stb aux eng", "description": "A leak on oil pan on aux eng starboard needs to change gasket", "dateRaised": "2025-03-21", "deadline": "2025-04-04", "dateClosed": "", "status": "Closed", "correctiveAction": "Gaskets changed and case is closed.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/758/frontpage-internal-audit-leak-on-the-oil-pan-on-stb-aux-eng?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "To be closed when changed gasket.", "finalManagementComment": "Gaskets changed and case is closed."}, {"id": "ba34a5ee-debc-46ef-8f9b-b7e4f810c707", "vessel": "Samson", "type": "OBS", "title": "Inernal audit chain lock broken", "description": "A chain lock in railing chain on starboard side is brocken", "dateRaised": "2025-03-21", "deadline": "2025-04-04", "dateClosed": "", "status": "Closed", "correctiveAction": "Chain lock fixed.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/757/frontpage-inernal-audit-chain-lock-broken?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "bb09e1d5-c8b9-4e72-aa00-7c4b172804e8", "vessel": "Samson", "type": "NC", "title": "Internal Audit oIl record and Sludge", "description": "The oil record book not properly filled out and missing receipts for sludge and waste oil taken from vessel", "dateRaised": "2025-03-21", "deadline": "2025-04-11", "dateClosed": "", "status": "Closed", "correctiveAction": "The master was instructed to fill out log book as required. All receipts must be kept on board.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/756/frontpage-internal-audit-oil-record-and-sludge?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "The master was instructed to f dio position.", "finalManagementComment": "The VHF has been relocated further away from the sticks. Case closed."}, {"id": "f5d4c26a-79e9-4946-88d7-f57c7a14fd17", "vessel": "Samson", "type": "NM", "title": "Cooling ME PS", "description": "19/02 a small leak was found on port ME cooling system. Company was notified, and harbours notified about Samson not being available until repairs had been made. Company was very supportive, and a lorry was dispatched that emptied the keel, while crew cleaned and prepared for repairs to be made. At around 2100 hrs, repairs had been conducted and crew topped up cooling liquid, and tested the engine for an hour an half. Samson was reported to company and harbours to be in working condition 2200 hrs", "dateRaised": "2021-02-22", "deadline": "2021-02-22", "dateClosed": "", "status": "Closed", "correctiveAction": "19/02/2021 Repairs made on the same day. To be closed out", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/516/frontpage-cooling-me-ps?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "Corrective actions accepted - Well done!"}, {"id": "d98a0a15-c904-4836-8d0f-33bb98c83e25", "vessel": "Samson", "type": "NC", "title": "Landstrøm og generator ind på tavlen samtidig", "description": "Generatoren blev koblet ind på tavlen mens landstrømmen stod tilkoblet. Dette skulle ikke kunne lade sig gøre, da der sidder spærringer for at hindre dette. Der er noget galt med spærringerne.", "dateRaised": "2020-12-17", "deadline": "2020-12-22", "dateClosed": "", "status": "Closed", "correctiveAction": "Sikring i landstrømstavle ombord brast. Den er skiftet, og vi kan køre på landstrøm igen. Generator bliver nu testet for at vide om den har tat skade.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/512/frontpage-landstrøm-og-generator-ind-på-tavlen-samtidig?start=0", "rootCause": "Outside our influence", "managementComment": "Modtaget. Når årsag / afhjælpning er gjort kan sagen lukkes.", "finalManagementComment": "Rectified - case closed."}, {"id": "e37f6496-0b08-4e60-9eee-c0bb7554e3a5", "vessel": "Samson", "type": "NM", "title": "Steering", "description": "During assisting a vessel coming to port, rudders were found to be sticky and/or unresponsive. After several attempts rectifying the issue, the vessel was turned into the desired direction with engines only. Shortly after the rudders responded as appropriate", "dateRaised": "2020-12-14", "deadline": "2021-01-29", "dateClosed": "", "status": "Closed", "correctiveAction": "After port operations, the rudders were tested extensively, and an ETO was called to investigate. The forward rudder stick control was found to be suffering from wear and tear. After investigating what spares are available, it was decided to switch about the FWD and AFT rudder stick control and order a new to replace the worn one. Further testing was done, however it was impossible to provoke the error to occur again This report can be closed as soon as the stick control has been replaced Rep prepared by EEJ", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/511/frontpage-steering?start=0", "rootCause": "Outside our influence", "managementComment": "Corrective actions are well accepted. Well done. Please inform ISM department once new parts are arrived and installed. Further testing to be carried out prior port operations to avoid same issues. Testing to be carried out once new parts are arrived and installed. Has the part been replaced??", "finalManagementComment": "Repaired - closed."}, {"id": "85e72854-8b1a-48c5-bc77-2de14788e364", "vessel": "Samson", "type": "NM", "title": "Starting FiFi pump when lying alongside.", "description": "The FiFi pump was started while we were alongside the quay with PS. The pump revolutions were so high that we washed down the quay and hit an other ship lying alongside 50 to 70 meters away. When operating the FiFi pump with high revolutions when lying in bert, we can draw small stones from the bottom into the pump. This can cause serious damage to people.", "dateRaised": "2020-12-07", "deadline": "2020-12-07", "dateClosed": "", "status": "Closed", "correctiveAction": "Procedure made for starting the FiFi pump.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/510/frontpage-starting-fifi-pump-when-lying-alongside?start=0", "rootCause": "Lack of procedure(s)", "managementComment": "Corrective action accepted. Please send a proposal for the procedure to HSEQ", "finalManagementComment": "Procedures received - case closed"}, {"id": "46339b5a-b7d1-43c3-a96c-47bcb66fe7a4", "vessel": "Samson", "type": "OBS", "title": "Deck surface, main deck", "description": "Deck plancks port side main deck found to be bulging and in less than goodshape", "dateRaised": "2020-10-29", "deadline": "2021-02-26", "dateClosed": "", "status": "Closed", "correctiveAction": "Crew made aware of uneven surface on deck, and dock list updated", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/samson-report-a-notification/details/17/504/frontpage-deck-surface,-main-deck?start=0", "rootCause": "Outside our influence", "managementComment": "Repaired??", "finalManagementComment": "Rectified - and closed"}, {"id": "d039c5df-6e05-4cb4-acef-54e5032b6b19", "vessel": "Herkules", "type": "NC", "title": "Not compliant with MLC", "description": "The crew has not got any salary in 3 months. This is absolutely not ok. These guys have families at home, and should have sent money to them long time ago. If we get a Port State Control we will be in deep shit.", "dateRaised": "2026-04-25", "deadline": "2026-05-05", "dateClosed": "", "status": "Overdue", "correctiveAction": "CEO and DPA are informed about the situation.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/839/frontpage-not-compliant-with-mlc?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Owner is well informed numbers of time regarding this situation. Despite that we are pushing him to resolve the salaries."}, {"id": "6f09a288-319c-49ac-97e1-83f8b2561a0e", "vessel": "Herkules", "type": "OBS", "title": "Towing hook", "description": "Towing hook is not working as it should nor assembled as it should. It needs to be greased and tested more often so that we can be sure that it releases the towing line every time we push the button.", "dateRaised": "2026-04-23", "deadline": "2026-05-23", "dateClosed": "", "status": "Closed", "correctiveAction": "Hook is now cleansed, greased disassembled and assembled again and works fine. Only we need to make it easier to move to port and starboard.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/838/frontpage-towing-hook?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": ""}, {"id": "3c2c553f-48cc-4f62-81db-782b40c39fe6", "vessel": "Herkules", "type": "NC", "title": "Key for fire hose coupling", "description": "2 keys are missing, one in the fire hose box no. 1 and 1 in the fire hose box no. 3.", "dateRaised": "2026-04-22", "deadline": "2026-04-22", "dateClosed": "", "status": "Closed", "correctiveAction": "2 keys were found in the storeroom and placed in the fire hose boxes.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/837/frontpage-key-for-fire-hose-coupling?start=0", "rootCause": "Choose:", "managementComment": "", "finalManagementComment": ""}, {"id": "2384c843-599b-4464-9a32-286483484bfc", "vessel": "Herkules", "type": "OBS", "title": "Sprinklers for windows on bridge", "description": "We get no water through sprinklers for windows on bridge.", "dateRaised": "2026-04-20", "deadline": "2026-05-20", "dateClosed": "", "status": "Closed", "correctiveAction": "Coils tested and found to be ok. Voltage for coils tested and found to be ok when we push the button. We continue searching.. We could find out that someone cut the pipe which lead to the bridge. We connected again and tested, and found out that one of the valve were leaking and the other one was not working like it should. Valves were dismantled and it seemed to be the diaphragm that was in bad condition. We have searched for diaphragm for this type of valve, but without luck.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/834/frontpage-sprinklers-for-windows-on-bridge?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": ""}, {"id": "3e41d13e-30c0-4ceb-9145-aaa567663639", "vessel": "Herkules", "type": "NC", "title": "Satellite and Magnetic Compass", "description": "The Satellite Compass does not always work properly. Some days OOW needs to use the tiller, because the Auto Pilot does not always get data from the Satellite Compass. When we on the Auto Pilot shift from Satellite Compass to Magnetic Compass, we get the warning CPS - LO - FAIL", "dateRaised": "2026-04-12", "deadline": "2026-05-12", "dateClosed": "", "status": "Closed", "correctiveAction": "Connection to instrument for Satelite Compass, and connection to Auto Pilot is tested and found to be ok. The fault seems to be that the Satellite Compass Antenna (disc) is placed too close to the mast. It is only placed 0,5 m from mast, and should at least be 1,5 meters away from a mast with this diameter. We also found out that the coil on the Magnetic Compass is not connected to the Autopilot, and as there is no instruction manual for the Autopilot, which is a Navitron NT921G, we have got info about wiring from Navitron in UK. We will try to find the cable from the Magnetic Compass and connect to the Autopilot. Cable found and magnetic coil connected to Autopilot, so now we can switch between Satellite Compass and Magnetic Compass. Antenna Plan can not be found onboard, so we have started to make an Antenna Plan.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/825/frontpage-satellite-and-magnetic-compass?start=0", "rootCause": "Lack of co-operation", "managementComment": "", "finalManagementComment": ""}, {"id": "ca20f87a-dfff-494c-912a-2b2b27446525", "vessel": "Herkules", "type": "OBS", "title": "Gangway", "description": "A ladder is used as gangway, and there is no safety net (see attached picture)*", "dateRaised": "2026-04-11", "deadline": "2026-04-11", "dateClosed": "", "status": "Closed", "correctiveAction": "The only corrective action made concerning this is to place a plate on the ladder, and to tie a rope between the vessel and a bollard ashore (see attached pictures) Our suggestion is to buy a 5 to 6 meters long gangway + a safety net.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/824/frontpage-gangway?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "c69d21e2-c3a0-4be8-9c42-256902e008d4", "vessel": "Herkules", "type": "OBS", "title": "Rescue Sling", "description": "The Rescue Sling, which is mounted outside, did not have any line connected to the sling.", "dateRaised": "2026-04-11", "deadline": "2026-04-11", "dateClosed": "", "status": "Closed", "correctiveAction": "We found a line in one of the store room and connected it to the sling. After this we held a MOB drill, where everyone was made familiar with the Rescue Sling. The locks for conneccting the rods together were losenet&greased. My opinion is that the Rescue Sling should not be mounted outside, but inside the ship, where the plastic parts on the sling would be protected by the sun, and the risk of loosing the Rescue Sling in bad weather was eliminated.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/823/frontpage-rescue-sling?start=0", "rootCause": "Lack of training", "managementComment": "", "finalManagementComment": ""}, {"id": "8b376e1c-0039-446e-87de-076eb7b04874", "vessel": "Herkules", "type": "OBS", "title": "Emergency Hatch covered with plastic", "description": "Emergency Hatch was covered with plastic which was tied with a rope. This was done because the hatch was not water tight.", "dateRaised": "2026-04-11", "deadline": "2026-04-11", "dateClosed": "", "status": "Closed", "correctiveAction": "Plastic and rope were removed, and new gasket ordered from agent. Today the old gasket was replaced with a new gasket. This is also done on the Emergency Hatch for engine room", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/822/frontpage-emergency-hatch-covered-with-plastic?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": ""}, {"id": "20eeabc2-a451-41f1-8059-a86e48cd2604", "vessel": "Herkules", "type": "NC", "title": "NC001", "description": "Medical Chest Certificate expired", "dateRaised": "2026-01-14", "deadline": "2026-01-13", "dateClosed": "", "status": "Closed", "correctiveAction": "Medicine chest ordered and waiting for delivery", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/784/frontpage-nc001?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Medical chest certificate renewed."}, {"id": "11ef7a85-87b7-4355-b485-8a6416fdaf5b", "vessel": "Herkules", "type": "NC", "title": "Crew working", "description": "During review of the vessel’s daily report dated 2025.09.29, photographic evidence showed a crew member working on the vessel’s hull without the use of a safety belt or fall protection. In accordance with the company SMS and international safety regulations, all crew members working aloft must wear appropriate personal protective equipment (PPE), including a safety belt or harness, to prevent falls and ensure safe working conditions.", "dateRaised": "2025-09-30", "deadline": "2025-09-30", "dateClosed": "", "status": "Closed", "correctiveAction": "Master to ensure all crew are reminded and instructed that safety belts/harnesses must always be worn when working aloft. Work shall not continue until appropriate PPE is in place. Master to perform: - Conduct toolbox talk addressing safe working aloft procedures. - Record the toolbox and issue a report 7-0104C Tool Box Meeting and send to shipping.fo - Ensure continuous monitoring and enforcement of PPE usage during all such tasks.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/778/frontpage-crew-working?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Master to ensure that corrective action are followed."}, {"id": "885608f0-5050-4b95-94ed-095c879d06f6", "vessel": "Herkules", "type": "NC", "title": "PSC-06", "description": "6.\tPortable fire fighting pump not located according to fire and safety plan", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Placed according to the fire plan", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/770/frontpage-psc-06?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "All items as per FS plan must be in place. Procedures to be followed."}, {"id": "f77e4b94-dd21-457f-9a31-dd55da80f817", "vessel": "Herkules", "type": "OBS", "title": "PSC-05", "description": "5.\tFire door to engine room not properly tight", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "dateClosed": "", "status": "Closed", "correctiveAction": "C/E was informed and will be fixed.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/769/frontpage-psc-05?start=0", "rootCause": "Lack of information", "managementComment": "", "finalManagementComment": "C/E and the crew adjusted the doors so it closes tightly."}, {"id": "9aa5c01a-d1e4-4f03-9937-75a490367fa4", "vessel": "Herkules", "type": "OBS", "title": "PSC-04", "description": "4.\tFire insulation in air condition room damaged", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Fire insulation removed and replaced with new one.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/768/frontpage-psc-04?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "Approved."}, {"id": "90d01cd9-34a3-46f6-83ea-155853ae24ac", "vessel": "Herkules", "type": "NC", "title": "PSC-03", "description": "3.\tFire detector in galley covered with plastic", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Plastic was removed.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/767/frontpage-psc-03?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Crew was instructed that such actions cannot be performed in any case. All fire detectors must be free from cover."}, {"id": "e4d89452-84c7-46ef-b974-701349b6bb12", "vessel": "Herkules", "type": "NC", "title": "PSC-02", "description": "IMO sign for FE missing from fire locker", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "dateClosed": "", "status": "Closed", "correctiveAction": "IMO sign ordered", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/766/frontpage-psc-02?start=0", "rootCause": "Lack of communication", "managementComment": "", "finalManagementComment": "IMO sign was requested and ordered by Master, will be delivered in Stavanger."}, {"id": "561bd1a6-7488-45dd-992f-1d0b1b057e4b", "vessel": "Herkules", "type": "NC", "title": "PSC-01", "description": "1.\tPublic announcement system not in working order", "dateRaised": "2025-08-19", "deadline": "2025-08-19", "dateClosed": "", "status": "Closed", "correctiveAction": "Changed the main intercom unit. Working properly.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/herkules-report-a-notification-2/details/19/765/frontpage-psc-01?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "Approved."}, {"id": "c80e5ed0-d5c5-437c-a93c-1d6d73a00d5e", "vessel": "Argus", "type": "NC", "title": "Loss of Access to MARAD (PMS)", "description": "The MARAD Planned Maintenance System (PMS) is currently non-functional on board. The issue has been reported to the DPA, and according to the feedback received, the matter is currently being escalated to the Ship Owner for resolution. As of now, the system remains inaccessible, preventing the technical department from managing maintenance schedules, reporting completed tasks, and monitoring safety-critical equipment intervals.", "dateRaised": "2026-04-21", "deadline": "2026-05-05", "dateClosed": "", "status": "Overdue", "correctiveAction": "1. To ensure compliance with safety regulations, all mandatory inspections and maintenance tasks (including Safety, Fire-Fighting, and Life-Saving equipment) are being recorded manually in the Deck Log Book and Engine Room Log Book. 2. Critical equipment running hours are tracked via engine room logs to prevent overdue maintenance. 3. Constant communication is maintained with the DPA regarding the status of the system restoration.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/836/frontpage-loss-of-access-to-marad-pms?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "We constantly reminding owenr to reinstate the MARAD and pay overdues. NC will be closed when MARAD lisense will be renewed."}, {"id": "ca9a3044-8ae2-4392-81f0-3cff5b558f45", "vessel": "Argus", "type": "NC", "title": "Discrepancies in Garbage Management Plan (GMP)", "description": "During an internal audit of the vessel's Garbage Management Plan (GMP) and actual garbage collection stations, several significant non-conformities were identified: 1.\tIncorrect Location of Main Garbage Station: The current GMP states that garbage receptacles for Plastic, Food, Domestic, and Operational waste are located on the Main Deck, Port Side. However, the actual physical location is on the Poop Deck Level, Starboard Side (Working boat Platform). 2.\tDiscrepancy in Receptacle Capacities: Actual internal measurements of the containers differ significantly from the volumes stated in the GMP: * Deck Operational Waste (Category F): Actual usable volume is 0.60 m³ (instead of 50L). * Engine Room Bin (Category F): Actual usable volume is 0.07 m³ (instead of 50L). 3.\tInconsistent Color Coding: Category F (Operational Waste) containers have different marking colors in the Engine Room and on Deck, which contradicts the requirement for a unified marking system as per the GMP. 4.\tInapplicable Waste Categories: Category J (Cargo Residues) is currently listed in the inventory but is not applicable to this vessel's type and trade.", "dateRaised": "2026-04-21", "deadline": "2026-08-21", "dateClosed": "", "status": "Open", "correctiveAction": "1. Conducted an internal audit and physical measurements of all garbage receptacles to establish actual usable volumes. 2. Created a 'Marked-up' working copy of the Garbage Management Plan (GMP) with corrected locations and capacities. 3. This corrected page has been printed and inserted into the onboard GMP folder to ensure accurate record-keeping in the Garbage Record Book until an official revision is received from the Company. 4. Briefed the crew/engine department on the corrected capacities for accurate entries.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/835/frontpage-discrepancies-in-garbage-management-plan-gmp?start=0", "rootCause": "Antiquated procedure", "managementComment": "", "finalManagementComment": "Revision will be made"}, {"id": "c47f841f-eca4-4053-8602-2428dc8e1821", "vessel": "Argus", "type": "OBS", "title": "REC 26-02 Cleanliness in ER can be improved.", "description": "We understand that vessel being docked and many repairs happening on the same time, however cleanliness in ER could be improved.", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/795/frontpage-rec-26-02-cleanliness-in-er-can-be-improved?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": ""}, {"id": "846866d2-79c3-41eb-b77c-cc84327d31c3", "vessel": "Argus", "type": "OBS", "title": "REC 26-01 Medicine in hospital not sorted out", "description": "During audit, in the hospital we have noticed that there is no lables on the wall cabins,shelfs with the medication list. We suggested that for quick search of required medicine, crew members should put labels on the cabins,shelfs with list of medicine.", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/794/frontpage-rec-26-01-medicine-in-hospital-not-sorted-out?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": ""}, {"id": "40b2aa25-8e3d-4b45-857c-2cf715ce7c36", "vessel": "Argus", "type": "NC", "title": "NC 26-05 Salaries are late (Owner)", "description": "During audit, when the interviews were taken with the crew, we received a lot of complaints for owner due to late salaries (3 months).", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/793/frontpage-nc-26-05-salaries-are-late-owner?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "We urged owner to pay the salaries within one month. Owner has now big issues with payments, due to 3 vessels being stopped in operations and in docked. If salaries will not be paid, we will take decision on next action. Salaries are paid up to February'26 Salaries settled up."}, {"id": "e313469e-1a4d-4637-a26a-cf93784cbd72", "vessel": "Argus", "type": "NC", "title": "NC 26-04 Petrol/Diesel stored in ventilation room", "description": "During the audit was noticed rescue boat petrol/diesel tanks (10L) stored in the ventilation room.", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/792/frontpage-nc-26-04-petrol-diesel-stored-in-ventilation-room?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "We have instructed the crew to move the tanks out of the ventilation room, because gases can escape and go inside the ventilation system. Ventilation locker cleaned out from gasoline container and other unnecessary items, the gasoline stored in helicopter fuel pump room. Evidence provided."}, {"id": "8453b852-585f-4979-afb2-0fbefa232c38", "vessel": "Argus", "type": "NC", "title": "NC 26-03 Freezer temperature not monitored", "description": "During the audit we have found logs/checklist attached to the freezer. It was not filled up and date entries with temperature was missing.", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/791/frontpage-nc-26-03-freezer-temperature-not-monitored?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "We have instructed cook that he needs to monitor temperature on freezers/fridges daily and log it on the checklist. Cook is now monitoring the temperature of the fridges/freezers. Evidence provided."}, {"id": "fa21df49-64fc-427d-9cef-a8b517167a24", "vessel": "Argus", "type": "NC", "title": "NC 26-02 SSP not in place", "description": "During the audit we have noticed that SSP is located in the bridge it was accessible for everyone.", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/790/frontpage-nc-26-02-ssp-not-in-place?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "We instructed Captain that SSP must be in secure locked place, in captain's cabin, due to the confidential information. SSP has been put in the ships safe. Evidence provided."}, {"id": "56ab72e7-473f-43c5-8f32-a5025533cd94", "vessel": "Argus", "type": "NC", "title": "NC 26-01 Rest hours", "description": "During the internal audit we have noticed that rest hours form does not reflect actual rest, for example when the drill was performed, it was not reflecting on the rest hours.", "dateRaised": "2026-02-04", "deadline": "2026-02-04", "dateClosed": "", "status": "Closed", "correctiveAction": "Captain was informed about this breach, and instructed that must be reflecting the actual situation and actual rest hours.", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/789/frontpage-nc-26-01-rest-hours?start=0", "rootCause": "Procedure(s) not followed", "managementComment": "", "finalManagementComment": "Captain must ensure that rest hours reflects actual rest. Records of rest hours now filled propely, evidence provided."}, {"id": "4ad88cb7-03cc-4ce3-98a6-c68607f4349a", "vessel": "Argus", "type": "NC", "title": "Overdue external audit", "description": "Vessel partly in operation, pending payments for release out of the Portugal.", "dateRaised": "2025-09-02", "deadline": "2025-10-02", "dateClosed": "", "status": "Closed", "correctiveAction": "External audit by class will be scheduled immediately after owners confirmation regarding release of the vessel to sail from Portugal", "raisedBy": "", "notes": "", "detailUrl": "https://shipping.konsult.fo/index.php/argus-report-a-notification/details/26/773/frontpage-overdue-external-audit?start=0", "rootCause": "Outside our influence", "managementComment": "", "finalManagementComment": "Vessel is released. Surveys of class will be in Las Palmas. Internal audit scheduled 01.2026"}, {"id": "d826624c-376e-4a10-b134-4346501345db", "vessel": "Argus", "type": "NC", "title": "Lifting of heavy items in engine room with expired lifting gear", "description": "A job involving lifting of Main engines lub oil coolers in engine room to be undertaken by crew upon Superintendents request in Dry
